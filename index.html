<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> GrãoNet – Mineração de Grãos</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'JetBrains Mono', monospace
    }

    :root {
      --brass: #CD7F32;
      --copper: #B87333;
      --silver: #C0C0C0;
      --gold: #FFD700;
      --diamond: #00FFFF;
      --uranium: #39FF14;
      --opal: #FF69B4;
      --bismuth: #E8B4F8;
      --niobium: #C084FC
    }

    .card-brass {
      background: linear-gradient(135deg, #1a1208, #251a0e);
      border: 1px solid #CD7F32
    }

    .card-copper {
      background: linear-gradient(135deg, #1a1008, #25180d);
      border: 1px solid #B87333
    }

    .card-silver {
      background: linear-gradient(135deg, #111318, #1c2028);
      border: 1px solid #C0C0C0
    }

    .card-gold {
      background: linear-gradient(135deg, #1a1500, #2a2200);
      border: 1px solid #FFD700
    }

    .card-diamond {
      background: linear-gradient(135deg, #001a1a, #002828);
      border: 1px solid #00FFFF;
      animation: diamondGlow 2.5s ease-in-out infinite
    }

    .card-uranium {
      background: linear-gradient(135deg, #001a00, #002800);
      border: 1px solid #39FF14;
      animation: uraniumGlow 2s ease-in-out infinite
    }

    .card-opal {
      background: linear-gradient(135deg, #1a0010, #28001a);
      border: 1px solid #FF69B4;
      animation: opalGlow 3s ease-in-out infinite
    }

    .card-bismuth {
      background: linear-gradient(135deg, #150a1a, #1f0f28);
      border: 1px solid #E8B4F8;
      animation: bismuthGlow 2.5s ease-in-out infinite
    }

    .card-niobium {
      background: linear-gradient(135deg, #0d001a, #150028);
      border: 1px solid #C084FC;
      animation: niobiumGlow 1.5s ease-in-out infinite
    }

    @keyframes diamondGlow {

      0%,
      100% {
        box-shadow: 0 0 6px #00FFFF50, 0 0 12px #00FFFF20
      }

      50% {
        box-shadow: 0 0 20px #00FFFFa0, 0 0 40px #00FFFF50, 0 0 70px #00FFFF20
      }
    }

    @keyframes uraniumGlow {

      0%,
      100% {
        box-shadow: 0 0 6px #39FF1450, 0 0 12px #39FF1420
      }

      50% {
        box-shadow: 0 0 25px #39FF14b0, 0 0 50px #39FF1460
      }
    }

    @keyframes opalGlow {
      0% {
        box-shadow: 0 0 10px #FF69B480
      }

      33% {
        box-shadow: 0 0 20px #00FFFF80
      }

      66% {
        box-shadow: 0 0 20px #C084FC80
      }

      100% {
        box-shadow: 0 0 10px #FF69B480
      }
    }

    @keyframes bismuthGlow {

      0%,
      100% {
        box-shadow: 0 0 8px #E8B4F860
      }

      50% {
        box-shadow: 0 0 25px #E8B4F8b0, 0 0 50px #C084FC40
      }
    }

    @keyframes niobiumGlow {

      0%,
      100% {
        box-shadow: 0 0 12px #C084FCa0, 0 0 25px #C084FC50
      }

      50% {
        box-shadow: 0 0 35px #C084FCff, 0 0 70px #C084FC80, 0 0 100px #C084FC30
      }
    }

    @keyframes purplePulse {

      0%,
      100% {
        text-shadow: 0 0 5px #a855f7, 0 0 10px #a855f7;
        color: #d8b4fe;
      }

      50% {
        text-shadow: 0 0 15px #a855f7, 0 0 30px #d8b4fe, 0 0 40px #a855f7;
        color: #f3e8ff;
      }
    }

    .glow-gold {
      color: #ffd700 !important;
      text-shadow: 0 0 5px rgba(255, 215, 0, 0.6), 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .glow-purple {
      animation: purplePulse 2s infinite ease-in-out;
      font-weight: bold;
    }

    @keyframes miningPulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.08)
      }
    }

    .mining-active {
      animation: miningPulse 0.6s ease-in-out infinite
    }

    @keyframes particleOut {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0
      }
    }

    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleOut 1s ease-out forwards
    }

    .shine-effect {
      position: relative;
      overflow: hidden
    }

    .shine-effect::after {
      content: '';
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, transparent 35%, rgba(255, 255, 255, 0.08) 50%, transparent 65%);
      animation: shine 4s ease-in-out infinite
    }

    @keyframes shine {

      0%,
      100% {
        transform: translate(-100%, -100%)
      }

      60%,
      100% {
        transform: translate(100%, 100%)
      }
    }

    .badge-first {
      background: linear-gradient(135deg, #FFD700, #FF6B35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .scrollbar-thin::-webkit-scrollbar {
      width: 4px
    }

    .scrollbar-thin::-webkit-scrollbar-track {
      background: #111
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px
    }

    .progress-bar {
      transition: width 0.3s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease forwards
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20%,
      60% {
        transform: translateX(-4px) rotate(-2deg);
      }

      40%,
      80% {
        transform: translateX(4px) rotate(2deg);
      }
    }

    .shake-anim {
      animation: shake 0.4s ease-in-out;
    }

    select,
    input,
    textarea {
      color-scheme: dark
    }
  </style>
</head>

        rarities: {

          silver: { label: 'Manga', emoji: '🥭' },
          gold: { label: 'Skunk', emoji: '🥦' },
          diamond: { label: 'Hash', emoji: '🎯' },
          uranium: { label: 'Rosin', emoji: '🧪' },
          opal: { label: 'Ice', emoji: '❄️' },

        }
      }
    };
    const PLANS = {
      mensal: { id: 'mensal_10', label: 'Mensal', price: 10.00, desc: '30 dias de VIP' },

    };

    const AudioEngine = {
      ctx: null,
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)() },
      play(type) {
        if (!CFG.SOUND) return;
        this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.connect(g);
        g.connect(this.ctx.destination);
        const now = this.ctx.currentTime;

        if (type === 'click') {
          o.type = 'sine'; o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
          g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          o.start(); o.stop(now + 0.1);
        } else if (type === 'success') {
          o.type = 'square'; o.frequency.setValueAtTime(440, now); o.frequency.setValueAtTime(880, now + 0.1);
          g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          o.start(); o.stop(now + 0.3);
        } else if (type === 'error') {
          o.type = 'sawtooth'; o.frequency.setValueAtTime(100, now); o.frequency.linearRampToValueAtTime(40, now + 0.2);
          g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.01, now + 0.2);
          o.start(); o.stop(now + 0.2);
        } else if (type === 'mine') {
          o.type = 'sine'; o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(300, now + 0.05);
          g.gain.setValueAtTime(0.02, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          o.start(); o.stop(now + 0.05);
        } else if (type === 'ready') {
          o.type = 'triangle'; o.frequency.setValueAtTime(523.25, now); o.frequency.setValueAtTime(659.25, now + 0.1); o.frequency.setValueAtTime(783.99, now + 0.2);
          g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          o.start(); o.stop(now + 0.5);
        } else if (type === 'notification') {
          o.type = 'sine'; o.frequency.setValueAtTime(880, now); o.frequency.setValueAtTime(1100, now + 0.12); o.frequency.setValueAtTime(880, now + 0.24);
          g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          o.start(); o.stop(now + 0.5);
        }
      }
    };

    const Notif = {
      async request() {
        if (!("Notification" in window)) {
          toast('Seu navegador não suporta notificações', 'error');
          return;
        }

        if (Notification.permission === "denied") {
          toast('Notificações bloqueadas no navegador. Ative nas configurações do site.', 'warning');
          S.notificationsEnabled = false;
        } else if (Notification.permission !== "granted") {
          const res = await Notification.requestPermission();
          if (res === "granted") {
            S.notificationsEnabled = true;
            toast('Notificações ativadas!', 'success');
          } else {
            S.notificationsEnabled = false;
          }
        } else {
          S.notificationsEnabled = !S.notificationsEnabled;
          toast(S.notificationsEnabled ? 'Notificações ativadas!' : 'Notificações desativadas', 'info');
        }

        await db.settings.put({ key: 'notificationsEnabled', value: S.notificationsEnabled });
        render();
      },
      send(title, body) {
        if (!S.notificationsEnabled || !("Notification" in window) || Notification.permission !== "granted") return;
        new Notification(title, { body, icon: 'https://discord.gg/j8mV9H7fWP' });
      }
    };

    let _cdNotified = false;
    function checkCooldownNotif() {
      if (!S.user) return;
      db.settings.get('lastMine').then(res => {
        if (!res) return;
        const elapsed = Date.now() - res.value;
        const cd = cooldownMs();
        if (elapsed >= cd) {
          if (!_cdNotified) {
            Notif.send('⛏️ Mineração Pronta!', 'O cooldown acabou. Hora de minerar mais grãos!');
            if (S.page === 'mine') startCdTimer();
            AudioEngine.play('ready');
            _cdNotified = true;
          }
        } else {
          _cdNotified = false;
        }
      });
    }
    setInterval(checkCooldownNotif, 10000);

    // ═══════════════════════════════════════════════════════
    // SUPABASE
    // ═══════════════════════════════════════════════════════
    const SB_URL = 'https://smrmnndnnpycmezauymk.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtcm1ubmRubnB5Y21lemF1eW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDI1NDUsImV4cCI6MjA5MjI3ODU0NX0.V5JcuUVTrbUFiDf71B1FMC2aOr1SXK029pAKex_1A88';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    async function sbUpsertGrain(grain) {
      const row = {
        id: grain.id, rarity: grain.rarity, hash: grain.hash, nonce: grain.nonce,
        generated_at: grain.generated_at, discord_user: grain.discord_user, discord_id: grain.discord_id,
        network_size_at_generation: grain.network_size_at_generation, owner: grain.owner,
        signature: grain.signature, transfer_history: grain.transfer_history || []
      };
      const { error } = await sb.from('grains').upsert(row, { onConflict: 'id' });
      if (error) console.warn('sb grain upsert:', error.message);
    }

    async function sbUpsertUser(user) {
      const { error } = await sb.from('users').upsert({
        discord_id: user.id,
        username: user.global_name || user.username || user.id,
        last_seen: Date.now(),
        theme: S.theme
      });
      if (error) console.warn('sb user upsert:', error.message);
    }

    async function updateNetworkSize() {
      try {
        const { count } = await sb.from('users').select('*', { count: 'exact', head: true });
        if (count) S.networkSize = Math.max(1, count);
        updateHeader();
      } catch (e) { }
    }

    async function ativarTrial() {
      if (!S.user) return loginWithDiscord();
      if (S.is_vip) return toast('Você já é VIP!', 'info');

      const { data } = await sb.from('users').select('trial_used').eq('discord_id', S.user.id).single();
      if (data?.trial_used) return toast('Você já utilizou seu período de teste!', 'warning');

      const now = Date.now();
      const until = now + (60 * 60 * 1000);

      const { error } = await sb.from('users').update({
        is_trial: true,
        trial_until: until,
        trial_used: true
      }).eq('discord_id', S.user.id);

      if (error) {
        toast('Erro ao ativar trial: ' + error.message, 'error');
        console.error(error);
        return;
      }

      S.is_trial = true;
      S.trial_until = until;
      S.autoClicker = true;
      S.pixModal = null;
      toast('🤖 Trial de 1h ativado! Ative o Auto-Clicker na página de mineração.', 'success', 5000);
      go(S.page, {}, true);
    }

    function setupRealtime() {
      if (!S.user || S.realtimeSubscribed) return;

      const channel = sb.channel('global')
        .on('broadcast', { event: 'vip_activated' }, ({ payload }) => {
          if (payload.userId === S.user.id) {
            S.is_vip = true;
            toast('⭐ VIP ATIVADO! Aproveite o brilho e o auto-clicker.', 'success', 8000);
            AudioEngine.play('success');
            spawnParticles('niobium'); // Efeito de comemoração
            render();
          }
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `discord_id=eq.${S.user.id}` }, async (payload) => {
          const myToken = localStorage.getItem('graonet_session');
          if (payload.new.session_token && payload.new.session_token !== myToken) {
            await sb.auth.signOut();
            S.user = null; S.realtimeSubscribed = false;
            toast('📱 Você entrou em outro dispositivo. Sessão encerrada aqui.', 'warning', 8000);
            render();
            return;
          }
          const changed = payload.new.is_vip !== S.is_vip || payload.new.theme !== S.theme;
          S.is_vip = payload.new.is_vip;
          S.theme = payload.new.theme;
          if (changed) go(S.page, {}, true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'market_listings_brl' }, () => {
          if (S.page === 'market') go('market', {}, true);
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'withdrawal_requests', filter: `user_id=eq.${S.user.id}` }, (payload) => {
          if (payload.new.status === 'completed') {
            AudioEngine.play('notification');
            toast('💸 Seu saque foi processado! O PIX foi enviado para sua chave.', 'success', 8000);
            if (S.page === 'bank') go('bank', {}, true);
          }
        })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') S.realtimeSubscribed = true;
        });
    }


    // ═══════════════════════════════════════════════════════
    // DATABASE (Dexie / IndexedDB)

    // ═══════════════════════════════════════════════════════
    // DATABASE (Dexie / IndexedDB)
    // ═══════════════════════════════════════════════════════
    const db = new Dexie('GraoNet_v1');
    db.version(1).stores({
      grains: '++localId, id, rarity, owner, generated_at',
      counters: 'rarity',
      transfers: '++id, grainId, from_user, to_user, timestamp',
      settings: 'key'
    });

    // ═══════════════════════════════════════════════════════
    // ESTADO GLOBAL

    // ═══════════════════════════════════════════════════════
    // CRIPTO
    // ═══════════════════════════════════════════════════════
    async function sha256(msg) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function leadingZeros(h) { let n = 0; for (const c of h) { if (c === '0') n++; else break } return n }

    // ═══════════════════════════════════════════════════════
    // DIFICULDADE
    // ═══════════════════════════════════════════════════════
    function diffOffset() { return Math.floor(S.networkSize / 50) }
    // 5min base + 1min por nó adicional, máx 60min — VIP tem 50% de redução
    function cooldownMs() {
      const base = Math.min(CFG.BASE_COOLDOWN_MS + (S.networkSize - 1) * 60000, 60 * 60 * 1000);
      return S.is_vip ? Math.floor(base * 0.5) : base;
    }
    function minZeros() { return 1 + diffOffset() }
    function rarityForZeros(z) {
      const o = diffOffset();
      if (z >= 9 + o) return 'niobium';
      if (z >= 8 + o) return 'bismuth';
      if (z >= 7 + o) return 'opal';
      if (z >= 6 + o) return 'uranium';
      if (z >= 5 + o) return 'diamond';
      if (z >= 4 + o) return 'gold';
      if (z >= 3 + o) return 'silver';
      if (z >= 2 + o) return 'copper';
      if (z >= 1 + o) return 'brass';
      return null;
    }

    // ═══════════════════════════════════════════════════════
    // IDs DOS GRÃOS
    // ═══════════════════════════════════════════════════════
    async function nextId(rarity) {
      const pfx = RARITY[rarity].prefix;
      try {
        const { data, error } = await sb.rpc('increment_counter', { r: rarity });
        if (!error && data) {
          await db.counters.put({ rarity, count: data });
          return `grão#${pfx}${String(data).padStart(2, '0')}`;
        }
      } catch (e) { }
      // fallback offline
      const rec = await db.counters.get(rarity);
      const n = (rec?.count || 0) + 1;
      await db.counters.put({ rarity, count: n });
      return `grão#${pfx}${String(n).padStart(2, '0')}`;
    }

    // ═══════════════════════════════════════════════════════
    // ASSINATURA
    // ═══════════════════════════════════════════════════════
    async function signGrain(g) {
      return sha256(`${g.id}${g.hash}${g.discord_id}${g.generated_at}`);
    }
    async function verifyGrain(g) {
      return g.signature === await signGrain(g);
    }

    // ═══════════════════════════════════════════════════════
    // MINERAÇÃO
    // ═══════════════════════════════════════════════════════
    async function startMining(silent = false) {
      if (!S.user) { AudioEngine.play('error'); toast('Faça login primeiro!', 'error'); return }
      if (S.mining) return;
      if (!silent) AudioEngine.play('click');

      // Checa cooldown no Supabase (sincroniza entre dispositivos)
      try {
        const { data } = await sb.from('users').select('last_mine').eq('discord_id', S.user.id).single();
        if (data?.last_mine) {
          const elapsed = Date.now() - data.last_mine;
          if (elapsed < cooldownMs()) {
            const mins = Math.ceil((cooldownMs() - elapsed) / 60000);
            const secs = Math.ceil((cooldownMs() - elapsed) / 1000) % 60;
            toast(`Cooldown: ${mins}m ${secs}s restante(s)`, 'warning');
            await db.settings.put({ key: 'lastMine', value: data.last_mine });
            return;
          }
        }
      } catch (e) {
        // fallback local
        const lastMine = await db.settings.get('lastMine');
        if (lastMine) {
          const elapsed = Date.now() - lastMine.value;
          if (elapsed < cooldownMs()) {
            const mins = Math.ceil((cooldownMs() - elapsed) / 60000);
            toast(`Cooldown: ${mins} minuto(s) restante(s)`, 'warning');
            return;
          }
        }
      }

      S.mining = true;
      S.miningCancelled = false;
      S.miningProgress = 0;
      S.hashrate = 0;
      render();

      const base = `${S.user.id}:${Date.now()}`;
      let nonce = 0;
      let start = Date.now();
      let found = null;
      let foundHash = '';

      const tick = async () => {
        if (S.miningCancelled) { S.mining = false; render(); return }

        for (let i = 0; i < CFG.CHUNK_SIZE; i++) {
          if (S.miningCancelled) break;
          const h = await sha256(`${base}:${nonce}`);
          const z = leadingZeros(h);
          const r = rarityForZeros(z);
          if (r) { found = r; foundHash = h; break }
          nonce++;
        }

        const secs = (Date.now() - start) / 1000;
        S.hashrate = Math.round(nonce / Math.max(secs, 0.001));
        S.miningProgress = Math.min(94, (nonce / 100000) * 100);

        if (found) {
          AudioEngine.play('success');
          await finishMining(foundHash, found, nonce);
        } else {
          if (nonce % 5000 === 0) AudioEngine.play('mine');
          render();
          setTimeout(tick, 0);
        }
      };
      setTimeout(tick, 0);
    }

      if (!CFG.DISCORD_WEBHOOK_URL) return;
      const r = RARITY[g.rarity];
      const isFirst = /[A-Z]0*1$/.test(g.id);
      const isRare = ['gold', 'diamond', 'uranium', 'opal', 'bismuth', 'niobium'].includes(g.rarity);

      // Condição especial: #01 com raridade 0 OU qualquer Raro
      if (!isRare && !isFirst) return;

      const embed = {
        title: isFirst ? `⭐ GRÃO LENDÁRIO DESCOBERTO! (#01)` : `🔥 NOVO DROP RARO!`,
        description: `**${g.discord_user}** acaba de encontrar um item valioso!`,
        color: parseInt(r.color.replace('#', ''), 16),
        fields: [
          { name: 'Item', value: `${r.emoji} **${g.id}** (${r.label})`, inline: true },
          { name: 'Raridade (Nonce)', value: `\`${(g.nonce || 0).toLocaleString()}\``, inline: true },
          { name: 'ID do Minerador', value: `\`${g.discord_id}\``, inline: false }
        ],
        footer: { text: 'GrãoNet • Sistema de Mineração P2P' },
        timestamp: new Date().toISOString()

      try {
        await fetch(CFG.DISCORD_WEBHOOK_URL, {

    async function finishMining(hash, rarity, nonce) {
      const id = await nextId(rarity);
      const user = S.user;
      const grain = {
        id, rarity, hash, nonce,
        generated_at: Date.now(),
        discord_user: user.global_name || user.username || user.id,
        discord_id: user.id,
        network_size_at_generation: S.networkSize,
        owner: user.id,
        transfer_history: []
      };
      grain.signature = await signGrain(grain);
      await db.grains.add(grain);
      const now = Date.now();
      await db.settings.put({ key: 'lastMine', value: now });
      sbUpsertGrain(grain);
      sb.from('users').update({ last_mine: now }).eq('discord_id', user.id).then(() => { });
      if (S.data.inventory) S.data.inventory.push({ ...grain });
      await addGrainToLavoura(grain);

      S.mining = false;
      S.miningProgress = 100;
      spawnParticles(rarity);
      broadcastGrain(grain);
      sendDiscordWebhook(grain);
      trackMission('mMine');
      toast(`🎉 ${id} ${getLabel('mining').toLowerCase()}! (${RARITY[rarity].label})`, 'success', 5000);

      render();
    }

    // ═══════════════════════════════════════════════════════
    // TRANSFERÊNCIA P2P
    // ═══════════════════════════════════════════════════════
    async function generateTransferPkg(grainId, targetId) {
      const g = await db.grains.where('id').equals(grainId).first();
      if (!g) { toast('Grão não encontrado', 'error'); return null }
      if (g.owner !== S.user.id) { toast('Você não é o dono', 'error'); return null }

      const pkg = {
        type: 'graonet_transfer', version: '1.0',
        grain: { ...g },
        from: S.user.id,
        from_username: g.discord_user,
        to: targetId,
        timestamp: Date.now(),
        nonce: crypto.randomUUID()
      };
      const raw = `${g.id}:${pkg.from}:${pkg.to}:${pkg.timestamp}:${pkg.nonce}`;
      pkg.sig = await sha256(raw);
      return JSON.stringify(pkg, null, 2);
    }

    async function receivePkg(json) {
      let pkg;
      try { pkg = JSON.parse(json) }
      catch (e) { toast('JSON inválido', 'error'); return false }
      if (pkg.type !== 'graonet_transfer') { toast('Tipo inválido', 'error'); return false }
      if (!S.user || (pkg.to !== S.user.id && pkg.to !== 'ANYONE')) { toast('Este pacote não é para você', 'error'); return false }

      const raw = `${pkg.grain.id}:${pkg.from}:${pkg.to}:${pkg.timestamp}:${pkg.nonce}`;
      const exp = await sha256(raw);
      if (pkg.sig !== exp) { toast('Assinatura inválida!', 'error'); return false }

      const existing = await db.grains.where('id').equals(pkg.grain.id).first();
      const updated = {
        ...pkg.grain,
        owner: S.user.id,
        transfer_history: [...(pkg.grain.transfer_history || []), {
          from: pkg.from_username, to: S.user.id, timestamp: pkg.timestamp
        }]
      };
      if (existing) { await db.grains.where('id').equals(pkg.grain.id).modify(updated) }
      else { await db.grains.add(updated) }

      await db.transfers.add({ grainId: pkg.grain.id, from_user: pkg.from, to_user: S.user.id, timestamp: pkg.timestamp });
      sbUpsertGrain(updated); // sincroniza novo dono no Supabase
      toast(`${pkg.grain.id} recebido de ${pkg.from_username}!`, 'success', 5000);
      render();
      return true;
    }

    // ═══════════════════════════════════════════════════════
    // REDE P2P (PeerJS)
    // ═══════════════════════════════════════════════════════
    function initPeer() {
      if (!S.user || window._peer) return;
      const pid = `graonet-${S.user.id}`.replace(/[^a-zA-Z0-9\-_]/g, '_');
      try {
        const peer = new Peer(pid, CFG.PEER_CFG);
        window._peer = peer;
        peer.on('open', id => { S.peerId = id; syncNetwork(); updateHeader() });
        peer.on('connection', conn => setupConn(conn));
        peer.on('error', () => { });
      } catch (e) { }
    }

    function setupConn(conn) {
      conn.on('open', () => {
        S.peers.set(conn.peer, conn);
        S.networkSize = Math.max(S.networkSize, S.peers.size + 1);
        conn.send({ type: 'hello', userId: S.user?.id });
        updateHeader();
      });
      conn.on('data', d => handlePeerData(conn, d));
      conn.on('close', () => { S.peers.delete(conn.peer); updateNetSize(); updateHeader() });
    }

    async function handlePeerData(conn, d) {
      if (d.type === 'hello') {
        const ctrs = await db.counters.toArray();
        conn.send({ type: 'counters', data: ctrs });
        S.networkSize = Math.max(S.networkSize, S.peers.size + 1);
      }
      if (d.type === 'counters') {
        for (const c of d.data || []) {
          const loc = await db.counters.get(c.rarity);
          if (!loc || c.count > loc.count) await db.counters.put(c);
        }
      }
      if (d.type === 'new_grain') {
        S.networkSize = Math.max(S.networkSize, d.net || 1);
        const r = RARITY[d.rarity];
        const isRare = ['gold', 'diamond', 'uranium', 'opal', 'bismuth', 'niobium'].includes(d.rarity);
        if (isRare && d.user && d.id) {
          toast(`🔥 DROP GLOBAL: @${d.user} acabou de achar um ${r.emoji} ${d.id}!`, 'warning', 8000);
          const flash = document.createElement('div');
          flash.className = 'fixed inset-0 pointer-events-none z-[100] opacity-20';
          flash.style.background = r.color;
          flash.style.animation = 'fadeOut 1s forwards';
          document.body.appendChild(flash);
          setTimeout(() => flash.remove(), 1000);
        }
      }
    }

    function broadcastGrain(g) {
      for (const [, c] of S.peers) {
        try {
          c.send({
            type: 'new_grain',
            rarity: g.rarity,
            user: g.discord_user,

    function lavouraRewards(n) {
      const num = ((n - 1) % 9) + 1; // ciclo 1-9
      if (num === 1) return ['copper', 'silver'];
      if (num === 2) return ['silver', 'silver'];
      if (num === 3) return ['silver', 'gold'];
      if (num === 4) return ['silver', 'silver', 'gold'];
      if (num === 5) return ['gold', 'gold'];
      if (num === 6) return ['gold', 'diamond'];
      if (num === 7) return ['gold', 'gold', 'diamond'];
      if (num === 8) return ['diamond', 'diamond'];
      return ['diamond', 'uranium']; // 9
    }

    function lavouraCapacity(n) {
      return Math.pow(10, n + 2);
    }

    async function loadLavoura() {
      try {
        const { data } = await sb.from('lavouras').select('*').eq('status', 'active').order('number').limit(1).single();

              .select('grains_count').eq('lavoura_id', data.id).eq('discord_id', S.user.id).single();
            S.myContrib = c?.grains_count || 0;

    async function addGrainToLavoura(grain) {
      if (!S.lavoura || !S.user) return;
      try {
        const { data } = await sb.rpc('add_grain_to_lavoura', {
          p_lavoura_id: S.lavoura.id,
          p_discord_id: S.user.id,
          p_discord_user: grain.discord_user
        });
        if (data && !data.error) {
          S.lavoura.grains_count = data.count;
          S.myContrib = (S.myContrib || 0) + 1;
          trackMission('mLav');
          if (data.full) await handleHarvest();
        }
      } catch (e) { }
    }

    async function handleHarvest() {
      try {
        const { data } = await sb.rpc('harvest_lavoura', { p_lavoura_id: S.lavoura.id });
        if (data?.error) {
          await loadLavoura();
          render();
          return;
        }
        const lavNum = S.lavoura.number;
        const isWinner = data.top_id === S.user.id;
        if (isWinner) {
          const rewards = lavouraRewards(lavNum);
          const gained = [];
          for (const rarity of rewards) {
            const id = await nextId(rarity);
            const reward = {
              id, rarity, nonce: 0,
              hash: await sha256(`reward:lavoura${lavNum}:${S.user.id}:${id}:${Date.now()}`),
              generated_at: Date.now(),
              discord_user: S.user.global_name || S.user.username,
              discord_id: S.user.id,
              network_size_at_generation: S.networkSize,
              owner: S.user.id,
              transfer_history: [],
              reward_from_lavoura: lavNum
            };
            reward.signature = await signGrain(reward);
            await db.grains.add(reward);
            sbUpsertGrain(reward);
            sendDiscordWebhook(reward);
            gained.push(`${RARITY[rarity].emoji} ${id}`);
          }
          spawnParticles(rewards[rewards.length - 1]);
          toast(`🌾 Fazenda #${lavNum} colhida! Você foi o top! +${gained.join(' · ')}`, 'success', 8000);
        } else {
          toast(`🌾 Fazenda #${lavNum} colhida! Top contribuidor: ${data.top_name}`, 'info', 5000);
        }
        await loadLavoura();
        render();
      } catch (e) { }
    }

    async function createListing() {
      const offerRarity = document.getElementById('mkt-offer-rarity')?.value;
      const offerQty = parseInt(document.getElementById('mkt-offer-qty')?.value) || 1;
      const offerMinNonce = parseInt(document.getElementById('mkt-offer-min-nonce')?.value) || 0;

      const askingRarity = document.getElementById('mkt-asking-rarity')?.value;
      const askingQty = parseInt(document.getElementById('mkt-asking-qty')?.value) || 1;
      const askingMinNonce = parseInt(document.getElementById('mkt-asking-min-nonce')?.value) || 0;

      if (offerRarity === askingRarity) { toast('Não pode trocar pelo mesmo minério', 'error'); return }

      const processGrains = await db.grains.where('owner').equals(S.user.id).toArray();
      const availableToOffer = processGrains.filter(g => g.rarity === offerRarity && (g.nonce || 0) >= offerMinNonce);

      if (availableToOffer.length < offerQty) {
        toast(`Você não tem ${offerQty}x ${RARITY[offerRarity].label} com raridade mínima de ${offerMinNonce}`, 'error');
        return;
      }

      const offeredIds = availableToOffer.slice(0, offerQty).map(g => g.id);

      const { error } = await sb.from('market_listings_v2').insert({
        seller_id: S.user.id,
        seller_name: S.user.global_name || S.user.username,
        offered_grain_ids: offeredIds,
        offering_rarity: offerRarity,
        offering_qty: offerQty,
        offering_min_nonce: offerMinNonce,
        asking_rarity: askingRarity,
        asking_qty: askingQty,
        asking_min_nonce: askingMinNonce
      });
      if (error) { toast('Erro ao criar oferta', 'error'); return }
      toast('Oferta publicada!', 'success');
      render();
    }

    async function confirmTrade(listingId) {
      const listing = S.acceptingListing;
      const myGrains = await db.grains.where('owner').equals(S.user.id).toArray();
      const payable = myGrains.filter(g => g.rarity === listing.asking_rarity && (g.nonce || 0) >= listing.asking_min_nonce);

      if (payable.length < listing.asking_qty) {
        toast('Você não tem os requisitos para essa troca.', 'error');
        return;
      }

      const paymentIds = payable.slice(0, listing.asking_qty).map(g => g.id);

      const { data, error } = await sb.rpc('execute_trade_v2', {
        p_listing_id: listingId,
        p_buyer_id: S.user.id,
        p_payment_grain_ids: paymentIds
      });
      if (error || (data && data.error)) { toast(`Erro: ${data?.error || error?.message}`, 'error'); return }

      const received_ids = data.received_grain_ids || [];
      const { data: recGrains } = await sb.from('grains').select('*').in('id', received_ids);
      if (recGrains) {
        for (const g of recGrains) {
          const exists = await db.grains.where('id').equals(g.id).first();
          if (exists) await db.grains.where('id').equals(g.id).modify({ ...g, owner: S.user.id });
          else await db.grains.add({ ...g, owner: S.user.id });
        }
      }

      for (const pid of paymentIds) {
        await db.grains.where('id').equals(pid).modify({ owner: data.seller_id });
      }

      S.acceptingListing = null;
      spawnParticles(listing.offering_rarity);
      toast(`✅ Troca concluída! Você recebeu ${listing.offering_qty}x ${RARITY[listing.offering_rarity].emoji}`, 'success', 5000);
      render();
    }

    async function loadInventoryFromSupabase(userId) {
      try {
        const all = [];
        let from = 0;
        const PAGE = 1000;
        while (true) {
          const { data, error } = await sb.from('grains').select('*').eq('owner', userId).range(from, from + PAGE - 1);
          if (error || !data?.length) break;
          all.push(...data);
          if (data.length < PAGE) break;
          from += PAGE;
        }
        if (all.length > 0) return all;
      } catch (e) { }
      // fallback: IndexedDB local
      return db.grains.where('owner').equals(userId).toArray();
    }

    async function syncFromSupabase(userId) {
      try {
        const data = await loadInventoryFromSupabase(userId);
        if (!data.length) return;
        let restored = 0;
        for (const g of data) {
          const exists = await db.grains.where('id').equals(g.id).first();
          if (!exists) {
            const { localId, ...grain } = g;
            await db.grains.add(grain);
            restored++;
          } else {
            const { localId, ...grain } = g;
            await db.grains.where('id').equals(g.id).modify(grain);
          }
        }
        if (restored > 0) {
          toast(`✅ ${restored} Grão${restored !== 1 ? 's' : ''} restaurado${restored !== 1 ? 's' : ''} do servidor!`, 'success', 5000);
        }
      } catch (e) { }
    }

    // ═══════════════════════════════════════════════════════
    function toast(msg, type = 'info', dur = 3000) {
      const c = document.getElementById('toasts'); if (!c) return;
      const cls = {
        success: 'bg-green-900 border-green-600 text-green-100', error: 'bg-red-900 border-red-600 text-red-100',
        warning: 'bg-yellow-900 border-yellow-600 text-yellow-100', info: 'bg-blue-900 border-blue-600 text-blue-100'
      };
      const el = document.createElement('div');
      el.className = `px-4 py-2 rounded border text-sm pointer-events-auto shadow-lg ${cls[type] || cls.info}`;
      el.style.animation = 'fadeIn 0.2s ease forwards';
      el.textContent = msg;
      c.appendChild(el);
      if (type === 'error' || type === 'warning') AudioEngine.play('error');
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300) }, dur);
    }

    // NAV & HISTÓRICO (Botão Voltar)
    // ═══════════════════════════════════════════════════════
    async function go(page, params = {}, silent = false) {
      if (!silent) {
        AudioEngine.play('click');
        window.scrollTo(0, 0);
      }
      S.page = page;
      S.params = params;

      // Pré-carregamento de dados para evitar flickering
      if (page === 'inventory') {
        if (S.user) S.data.inventory = await db.grains.where('owner').equals(S.user.id).toArray();
      } else if (page === 'market') {
        const { data: listings } = await sb.from('market_listings_v2').select('*').eq('status', 'active').order('created_at', { ascending: false });
        S.data.marketListings = listings || [];
        if (S.user) S.data.inventory = await db.grains.where('owner').equals(S.user.id).toArray();

        if (S.marketTab === 'transfer') {
          if (S.user) {
            const transfers = await db.transfers.where('from_user').equals(S.user.id).or('to_user').equals(S.user.id)
              .reverse().limit(15).toArray();
            S.data.transfers = transfers || [];
          }
        } else {
          const { data: history } = await sb.from('market_listings_brl').select('price, sold_at, rarity').eq('status', 'sold').order('sold_at', { ascending: true }).limit(500);
          const { data: listingsBRL } = await sb.from('market_listings_brl').select('*').order('created_at', { ascending: false });
          S.data.marketBRLHistory = history || [];
          S.data.marketBRLListings = listingsBRL || [];
          if (S.user) {
            const { data: profile } = await sb.from('users').select('real_balance').eq('discord_id', S.user.id).single();
            S.user_profile = profile;
          }
        }
      } else if (page === 'ranking') {
        try {
          const { data: rData, error: rErr } = await sb.rpc('get_ranking');
          if (rErr) console.error('[ranking] rpc error:', rErr);
          if (rData) {
            S.data.rankingRpc = rData;
            S.data.rankingSource = 'global';
          }
          await loadLavoura();
        } catch (e) {
          console.error('[ranking] catch error:', e);
          S.data.rankingSource = 'local';
        }
      } else if (page === 'mine') {
        if (S.user) S.data.inventory = await db.grains.where('owner').equals(S.user.id).toArray();
        await loadLavoura();
      } else if (page === 'event') {
        if (S.user) S.data.inventory = await db.grains.where('owner').equals(S.user.id).toArray();
        await loadMissions();
      } else if (page === 'profile') {
        if (!S.data.rankingRpc?.length) {
          const { data: rData } = await sb.rpc('get_ranking');
          if (rData) { S.data.rankingRpc = rData; S.data.rankingSource = 'global'; }
        }
        if (S.user) {
          if (!S.data.inventory?.length) S.data.inventory = await db.grains.where('owner').equals(S.user.id).toArray();
          const { data: profile } = await sb.from('users').select('real_balance, total_withdrawn, pix_key, pix_key_type').eq('discord_id', S.user.id).single();
          S.user_profile = profile;
        }
        await loadMissions();
      } else if (page === 'store' || page === 'bank') {
        if (S.user) {
          const { data: profile } = await sb.from('users').select('real_balance, total_withdrawn, pix_key, pix_key_type').eq('discord_id', S.user.id).single();
          S.user_profile = profile;
          if (page === 'bank') {
            const { data: history } = await sb.from('market_listings_brl')
              .select('*')
              .or(`seller_id.eq.${S.user.id},buyer_id.eq.${S.user.id}`)
              .eq('status', 'sold')
              .order('sold_at', { ascending: false })
              .limit(15);
            S.data.bankHistory = history || [];

            const { data: withdrawals } = await sb.from('withdrawal_requests')
              .select('*')
              .eq('user_id', S.user.id)
              .order('created_at', { ascending: false })
              .limit(10);
            S.data.withdrawalHistory = withdrawals || [];
          }
        }
      } else if (page === 'admin') {
        if (S.user?.id !== ADMIN_ID) { S.page = 'inventory'; render(); return; }
        const { data: saques } = await sb.from('withdrawal_requests')
          .select('*').eq('status', 'pending').order('created_at', { ascending: true });
        const { data: saquesPagos } = await sb.from('withdrawal_requests')
          .select('*').eq('status', 'completed').order('processed_at', { ascending: false }).limit(30);
        S.data.adminSaques = saques || [];
        S.data.adminSaquesPagos = saquesPagos || [];
        S.data.adminUser = null;
      }

      render();
    }

    // ═══════════════════════════════════════════════════════
    // CARD DE GRÃO
    // ═══════════════════════════════════════════════════════
    function grainCard(g, compact = false) {
      if (!g?.id) return '';
      const r = RARITY[g.rarity];
      const first = /[A-Z]0*1$/.test(g.id);
      const dt = new Date(g.generated_at).toLocaleDateString('pt-BR');
      const hasShine = ['diamond', 'uranium', 'opal', 'bismuth', 'niobium'].includes(g.rarity);
      return `<div class="card-${g.rarity} rounded-lg p-3 cursor-pointer hover:scale-[1.03] transition-transform ${hasShine ? 'shine-effect' : ''} fade-in"
    onclick="go('grain',{id:'${g.id}'})" title="${g.id}">
    <div class="flex items-center justify-between mb-1">
      <span class="text-xl">${r.emoji}</span>
      ${first ? `<span class="text-[10px] font-bold badge-first">★ 1º</span>` : ''}
      <span class="text-[10px] text-gray-500 ml-auto">${dt}</span>
    </div>
    <div class="font-bold text-xs font-mono" style="color:${r.color}">${g.id}</div>
    <div class="text-[10px] text-gray-400">${r.label}</div>
    ${!compact ? `<div class="text-[9px] text-gray-600 mt-1 truncate">Raridade: ${(g.nonce || 0).toLocaleString()}</div>` : ''}
  </div>`;
    }

    function pageInventorySync() {
      if (!S.user) return pageLogin();
      const all = S.data.inventory || [];
      const filtered = S.filter === 'all' ? all : all.filter(g => g.rarity === S.filter);
      const counts = {};
      for (const r of ORDER) counts[r] = all.filter(g => g.rarity === r).length;

      const sort = S.inventorySort || 'rarity_desc';
      const sorted = [...filtered].sort((a, b) => {
        if (sort === 'rarity_asc') return ORDER.indexOf(b.rarity) - ORDER.indexOf(a.rarity) || a.generated_at - b.generated_at;
        return ORDER.indexOf(a.rarity) - ORDER.indexOf(b.rarity) || a.generated_at - b.generated_at;
      });

      return `<div class="p-4 sm:p-6">
    ${all.length >= 500 ? `<div class="mb-4 flex items-start gap-2 bg-yellow-900/20 border border-yellow-700/40 rounded-lg px-3 py-2 text-[11px] text-yellow-400">
      <span class="text-base leading-none mt-0.5">⚠️</span>
      <span>Você tem <strong>${all.length.toLocaleString('pt-BR')} ${getLabel('grain_pl').toLowerCase()}</strong> no inventário. Inventários grandes podem causar lentidão ao abrir o app. Considere usar a Debulhadora ou o Cassino para converter grãos comuns em raridades superiores.</span>
    </div>` : ''}
    <div class="flex flex-wrap gap-2 mb-3">
      <button onclick="setFilter('all')" class="px-3 py-1 rounded text-xs font-medium transition-colors border ${S.filter === 'all' ? 'bg-gray-700 border-gray-500 text-white' : 'bg-gray-900 border-gray-800 text-gray-400 hover:bg-gray-800'}">
        Todos (${all.length})
      </button>
      ${ORDER.map(r => `<button onclick="setFilter('${r}')"
        class="px-3 py-1 rounded text-xs font-medium transition-colors border"
        style="color:${RARITY[r].color};border-color:${S.filter === r ? RARITY[r].color : RARITY[r].color + '30'};background:${S.filter === r ? RARITY[r].color + '25' : 'transparent'}">
        ${RARITY[r].emoji} ${RARITY[r].label} (${counts[r]})
      </button>`).join('')}
    </div>
    <div class="flex gap-2 mb-5">
      <button onclick="setInventorySort('rarity_desc')" class="px-3 py-1 rounded text-xs font-medium transition-colors border ${sort === 'rarity_desc' ? 'bg-gray-700 border-gray-500 text-white' : 'bg-gray-900 border-gray-800 text-gray-400 hover:bg-gray-800'}">
        ↓ Raro → Comum
      </button>
      <button onclick="setInventorySort('rarity_asc')" class="px-3 py-1 rounded text-xs font-medium transition-colors border ${sort === 'rarity_asc' ? 'bg-gray-700 border-gray-500 text-white' : 'bg-gray-900 border-gray-800 text-gray-400 hover:bg-gray-800'}">
        ↑ Comum → Raro
      </button>
    </div>
    ${sorted.length === 0 ? `<div class="text-center py-20 text-gray-600">
      <div class="text-6xl mb-4">🌾</div>
      <div class="text-lg mb-2">Nenhuma ${getLabel('grain').toLowerCase()} aqui</div>
      <button onclick="go('mine')" class="text-cyan-400 hover:underline text-sm">Ir para ${getLabel('mining')} →</button>
    </div>`: `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">${sorted.map(g => grainCard(g)).join('')}</div>`}
  </div>`;
    }

    function pageMineSync() {
      if (!S.user) return pageLogin();
      const cdMs = cooldownMs();
      let cd = null;
      // We still need to check lastMine, but we can do it locally if possible or just use state
      // For now, keep it simple
      const off = diffOffset();
      const cdMins = Math.round(cdMs / 60000);
      const myGrains = S.data.inventory || [];
      const counts = {};
      for (const r of ORDER) counts[r] = myGrains.filter(g => g.rarity === r).length;
      const sorted = [...myGrains].sort((a, b) => ORDER.indexOf(a.rarity) - ORDER.indexOf(b.rarity));

      return `<div class="p-4 sm:p-6 max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-1">⛏️ ${getLabel('mining')}</h2>
    <p class="text-gray-400 text-sm mb-4">Prova de trabalho no browser para ${getLabel('mine').toLowerCase()} ${getLabel('grains').toLowerCase()} únicos.</p>


    <div class="bg-gray-900 rounded-lg p-4 mb-4">
      <div class="text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-wide">Tabela de Raridade</div>
      <div class="grid grid-cols-4 text-[10px] text-gray-600 pb-1 mb-1 border-b border-gray-800">
        <div>Raridade</div><div class="text-center">Zeros</div><div class="text-center">Chance</div><div class="text-right">Seus</div>
      </div>
      ${ORDER.map(r => {
        const z = RARITY[r].zeros + off;
        const prob = z <= 3 ? (1 / Math.pow(16, z) * 100).toFixed(2) + '%' : z === 4 ? '~0.0015%' : '~0.0001%';
        return `<div class="grid grid-cols-4 items-center py-1 border-b border-gray-800/40 text-xs">
          <span class="flex items-center gap-1">${RARITY[r].emoji}<span style="color:${RARITY[r].color}">${RARITY[r].label}</span></span>
          <span class="text-center font-mono text-gray-400">${z}+</span>
          <span class="text-center text-[10px] text-gray-500">${prob}</span>
          <span class="text-right font-bold" style="color:${RARITY[r].color}">${counts[r] || 0}</span>
        </div>`;
      }).join('')}
      ${off > 0 ? `<div class="text-[10px] text-yellow-700 mt-2">⚠ Dificuldade +${off} pela rede crescente</div>` : ''}
    </div>

    ${S.lavoura ? `<div class="bg-gray-900 rounded-lg p-4 mb-4 border border-green-900/40">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[10px] text-green-400 font-bold uppercase tracking-wide">🌾 Fazenda #${S.lavoura.number} — Ativa</div>
        <div class="text-[10px] text-gray-400">${lavouraRewards(S.lavoura.number).map(r => RARITY[r].emoji).join(' ')}</div>
      </div>
      <div class="bg-gray-800 rounded-full h-3 overflow-hidden mb-2">
        <div class="h-full rounded-full transition-all" style="width:${Math.min(100, (S.lavoura.grains_count / S.lavoura.capacity) * 100).toFixed(2)}%;background:linear-gradient(90deg,#16a34a,#4ade80)"></div>
      </div>
      <div class="flex justify-between text-[10px] text-gray-500 mb-1">
        <span>${Number(S.lavoura.grains_count).toLocaleString('pt-BR')} Grãos minerados</span>
        <span>${Number(S.lavoura.capacity).toLocaleString('pt-BR')} total</span>
      </div>
      ${S.myContrib > 0 ? `<div class="text-[10px] text-cyan-400">Sua contribuição: ${S.myContrib} Grão${S.myContrib !== 1 ? 's' : ''}</div>` : ''}
    </div>`: ''}

    ${sorted.length > 0 ? `<div class="bg-gray-900 rounded-lg p-4 mb-4">
      <div class="text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-wide">Seus ${getLabel('grains')} (${sorted.length})</div>
      <div class="flex flex-wrap gap-1 max-h-24 overflow-y-auto scrollbar-thin">
        ${sorted.map(g => `<span onclick="go('grain',{id:'${g.id}'})" title="${new Date(g.generated_at).toLocaleDateString('pt-BR')}"
          class="cursor-pointer px-2 py-0.5 rounded text-[10px] font-mono border hover:brightness-125 transition-all"
          style="color:${RARITY[g.rarity].color};border-color:${RARITY[g.rarity].color}40;background:${RARITY[g.rarity].color}10">
          ${RARITY[g.rarity].emoji} ${g.id}
        </span>`).join('')}
      </div>
    </div>`: ''}

    <div class="bg-gray-900 rounded-lg p-6 text-center">
      ${S.mining ? `
        <div class="text-5xl mb-3 mining-active">⛏️</div>
        <div class="font-bold mb-4">Minerando...</div>
        <div class="bg-gray-800 rounded-full h-3 mb-3 overflow-hidden">
          <div class="h-full rounded-full progress-bar" style="width:${S.miningProgress}%;background:linear-gradient(90deg,#00FFFF,#0080FF)"></div>
        </div>
        <div class="text-sm text-gray-400 mb-5">Hashrate: <span class="text-cyan-400 hashrate-val">${S.hashrate.toLocaleString()}</span> H/s</div>
        <button onclick="cancelMining()" class="bg-red-900 hover:bg-red-800 px-6 py-2 rounded text-sm transition-colors">✕ Cancelar</button>
      `: `
        <div class="text-6xl mb-4">🌾</div>
        <p class="text-gray-400 text-sm mb-6">Mais zeros no hash = ${getLabel('grain')} mais raro!<br>Cooldown: ${cdMins} minuto${cdMins !== 1 ? 's' : ''} após ${getLabel('mine').toLowerCase()}.</p>
        
        <div id="cooldown-area" class="hidden mb-6">
          <div class="bg-gray-950 border border-yellow-900/30 rounded-xl p-4 inline-block min-w-[200px]">
            <div class="text-[10px] text-yellow-500 font-bold uppercase mb-1">Aguardando Cooldown</div>
            <div id="cd-timer" class="text-2xl font-mono font-bold text-white">--:--</div>
          </div>
        </div>

        <button id="btn-start-mine" onclick="startMining()" class="bg-cyan-700 hover:bg-cyan-600 px-8 py-3 rounded-lg font-bold text-lg transition-colors">

        <div class="mt-6 pt-6 border-t border-gray-800 flex flex-col items-center gap-3">

        </div>
      `}

  </div>`;

              <button onclick="salvarPixPerfil()" class="text-[10px] bg-green-700 hover:bg-green-600 text-white px-2 py-1 rounded-lg transition-colors">Salvar</button>

            <div class="flex items-center gap-2 flex-wrap">

                ? `<span class="text-[10px] text-green-400">💳 ${S.user_profile.pix_key_type?.toUpperCase()||'PIX'}: ${S.user_profile.pix_key}</span>`

    function fmtK(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return n.toString();
    }

    function pageRankingSync() {
      if (!S.user) return pageLogin();
      const source = S.data.rankingSource;
      const rData = S.data.rankingRpc || [];
      const emptyC = () => Object.fromEntries(ORDER.map(r => [r, 0]));

      const users = rData.map(u => {
        const counts = emptyC();
        const raw = u.counts || {};
        for (const r of ORDER) counts[r] = raw[r] || 0;
        return { uid: u.discord_id, name: u.username, is_vip: u.is_vip, counts, total: Number(u.total) || 0 };
      });

      const medal = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
      const totalGrains = users.reduce((s, u) => s + u.total, 0);

      return `<div class="p-4 sm:p-6 max-w-5xl mx-auto">

    <div class="text-[10px] text-gray-600 mb-3">${source === 'global' ? `✅ Dados globais · ${fmtK(totalGrains)} grão(s) · ${users.length} jogador(es)` : '⚠️ Dados locais (offline)'}</div>

            const me = d.uid === S.user?.id;
            return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/40 transition-colors ${me ? 'bg-gray-800/30' : ''}">
                  <td class="px-4 py-2">

                      <button onclick="go('profile',{uid:'${d.uid}'})" class="text-xs ${d.is_vip ? 'glow-gold font-bold' : (me ? 'text-cyan-400 font-bold' : 'text-gray-300 hover:text-white')} transition-colors">${d.name}</button>
                      ${d.is_vip ? '<span class="ml-1 text-[8px] px-1 bg-purple-900/50 text-purple-300 border border-purple-700 rounded font-bold">VIP</span>' : ''}
                    </div>
                  </td>
                  ${ORDER.map(r => `<td class="text-center py-2 px-1 font-mono text-xs" style="color:${RARITY[r].color}">
                    ${d.counts[r] ? fmtK(d.counts[r]) : '<span class="text-gray-700">–</span>'}
                  </td>`).join('')}
                  <td class="text-right px-4 py-2 font-bold text-white">
                    ${fmtK(d.total)}
                  </td>
                </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    ${(() => {
      const myIdx = users.findIndex(d => d.uid === S.user?.id);

    function pageMarketSync() {
      if (!S.user) return pageLogin();
      const listings = S.data.marketListings || [];
      const myGrains = S.data.inventory || [];

    function renderMarketBRLSync() {
      if (!S.user) return pageLogin();
      const selectedRarity = S.mktHistoryRarity || 'brass';
      const history = S.data.marketBRLHistory || [];
      const listings = S.data.marketBRLListings || [];
      const inventory = S.data.inventory || [];

      const mySales = listings.filter(l => l.seller_id === S.user.id && l.status !== 'cancelled');
      const activeListings = listings.filter(l => l.seller_id !== S.user.id && l.status === 'active');
      const pendingOrders = listings.filter(l => l.buyer_id === S.user.id && l.status === 'pending_payment');
      const myListedGrainIds = new Set(mySales.map(l => l.grain_id));

      // per-rarity stats from listings
      const rarityColor = { brass: '#cd7f32', copper: '#b87333', silver: '#c0c0c0', gold: '#ffd700', titanium: '#a8b2bd', diamond: '#b9f2ff', lavoura: '#86efac' };
      const allSold = listings.filter(l => l.status === 'sold').sort((a,b) => new Date(a.sold_at||0) - new Date(b.sold_at||0));
      const selRarityColor = rarityColor[selectedRarity] || '#22c55e';
      const selSoldPrices = allSold.filter(l => l.rarity === selectedRarity).map(l => parseFloat(l.price));
      const lastSoldPrice = selSoldPrices.length ? selSoldPrices[selSoldPrices.length - 1] : null;
      const lowestAsk = activeListings.filter(l => l.rarity === selectedRarity).map(l => l.price).sort((a,b) => a-b)[0] ?? null;
      const priceChange = selSoldPrices.length >= 2 ? ((selSoldPrices[selSoldPrices.length-1] - selSoldPrices[selSoldPrices.length-2]) / selSoldPrices[selSoldPrices.length-2] * 100) : null;

      // available inventory to list (not locked, not already listed)
      const availableByRarity = {};
      for (const r of ORDER) availableByRarity[r] = inventory.filter(g => g.rarity === r && !g.lock_trade && !myListedGrainIds.has(g.id));
      const listFormRarity = S.mktListRarity || ORDER.find(r => availableByRarity[r].length > 0) || 'brass';
      const availableForListing = availableByRarity[listFormRarity] || [];

      return `
    <!-- STATS BAR -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
      ${ORDER.slice().reverse().map(r => {
        const sold = allSold.filter(l => l.rarity === r);
        const last = sold.length ? parseFloat(sold[sold.length-1].price) : BASE_PRICE[r];
        const asks = activeListings.filter(l => l.rarity === r);
        const isActive = selectedRarity === r;
        return `<button onclick="S.mktHistoryRarity=(S.mktHistoryRarity==='${r}'?null:'${r}'); go('market')" class="flex-shrink-0 flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg border transition-all ${isActive ? 'border-gray-400 bg-gray-800 shadow-lg' : 'border-gray-800 bg-gray-900 hover:border-gray-700 opacity-60'}">
          <span class="text-base">${RARITY[r].emoji}</span>
          <span class="text-[9px] font-bold" style="color:${RARITY[r].color}">${RARITY[r].label}</span>
          ${last != null ? `<span class="text-[9px] text-gray-300">R$ ${last.toFixed(2)}</span>` : `<span class="text-[9px] text-gray-500">livre</span>`}
          <span class="text-[8px] text-gray-600">${asks.length} à venda</span>
        </button>`;
      }).join('')}
    </div>

    <!-- CHART SECTION -->
    <div class="mb-3 bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
      <div class="flex items-center justify-between px-4 pt-3 pb-2 border-b border-gray-800">
        ${selectedRarity ? `
        <div class="flex items-center gap-2">
          <span class="text-base">${RARITY[selectedRarity].emoji}</span>
          <span class="text-sm font-bold" style="color:${selRarityColor}">${RARITY[selectedRarity].label}</span>
          ${lastSoldPrice != null ? `<span class="text-sm font-bold text-white">R$ ${lastSoldPrice.toFixed(2)}</span>` : BASE_PRICE[selectedRarity] != null ? `<span class="text-xs text-gray-500">Base: R$ ${BASE_PRICE[selectedRarity].toFixed(2)}</span>` : `<span class="text-xs text-gray-500">Preço livre</span>`}
          ${priceChange != null ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${priceChange >= 0 ? 'text-green-400 bg-green-900/30' : 'text-red-400 bg-red-900/30'}">${priceChange >= 0 ? '+' : ''}${priceChange.toFixed(1)}%</span>` : ''}
        </div>
        <div class="flex items-center gap-3 text-[10px] text-gray-500">
          ${lowestAsk != null ? `<span>Menor oferta: <b class="text-gray-300">R$ ${lowestAsk.toFixed(2)}</b></span>` : ''}
          <span>${selSoldPrices.length} vendas</span>
          <button onclick="S.mktHistoryRarity=null; go('market')" class="text-gray-600 hover:text-white ml-1">✕</button>
        </div>
        ` : `
        <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">📊 Todas as Raridades</span>
        <span class="text-[10px] text-gray-600">Clique numa raridade para filtrar</span>

      </div>
      <div class="flex gap-1 px-3 pt-2">
        ${['24h','7d','30d','tudo'].map(p => `<button onclick="S.mktPeriod='${p}'; go('market')" class="px-2 py-0.5 rounded text-[10px] border transition-all ${(S.mktPeriod||'tudo')===p ? 'bg-gray-700 border-gray-500 text-white' : 'bg-transparent border-gray-800 text-gray-500 hover:text-gray-300'}">${p}</button>`).join('')}
      </div>
      <div class="px-2 pt-1 pb-1 relative overflow-hidden" style="height:200px">
        ${renderMktHistoryGraph(history, selectedRarity, S.mktPeriod || 'tudo')}
      </div>
    </div>

    <!-- INFO NONCE -->
    <div class="mb-6 bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 flex gap-3 items-start">
      <span class="text-lg mt-0.5">💡</span>
      <div class="text-[10px] text-gray-400 leading-relaxed">
        <b class="text-gray-200">Como funciona o valor de um grão?</b><br>
        O <b class="text-gray-300">#01</b> é mais raro que o <b class="text-gray-300">#05</b>, pois ele foi o <b>primeiro colhido</b> naquela fazenda.<br>
        Quanto mais difícil foi gerar o grão, mais valioso ele tende a ser no mercado. A raridade 0 é a mais rara de todas!
      </div>
    </div>

    <!-- ANUNCIAR INLINE -->
    <div class="mb-6 bg-gray-900 border border-gray-800 rounded-xl p-4">
      <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">📤 Anunciar Item</h4>
      ${inventory.length === 0 ? `<p class="text-[10px] text-gray-600 italic">Sem grãos no inventário para anunciar.</p>` : `
      <!-- chips de raridade -->
      <div class="flex flex-wrap gap-1.5 mb-3">
        ${ORDER.slice().reverse().map(r => {
          const cnt = availableByRarity[r].length;
          if (cnt === 0) return '';
          const active = listFormRarity === r;
          return `<button onclick="S.mktListRarity='${r}'; S.mktSelectedGrain=null; render()" class="px-2 py-1 rounded text-[10px] border transition-all flex items-center gap-1" style="color:${RARITY[r].color};border-color:${active ? RARITY[r].color : RARITY[r].color+'30'};background:${active ? RARITY[r].color+'20' : 'transparent'}">
            ${RARITY[r].emoji} ${RARITY[r].label} <span class="opacity-60">(${cnt})</span>

    async function solicitarCompraP2P(listingId) {
      S.pixModal = { loading: true };
      render();

      try {
        const { data, error } = await sb.functions.invoke('gerar-pix-p2p', {
          body: {
            buyerId: S.user.id,
            buyerName: S.user.global_name || S.user.username,
            listingId
          }
        });

        if (error) throw error;

        S.pixModal = {
          loading: false,
          qrcode: data.qrcode,
          copia_e_cola: data.copia_e_cola,
          type: 'p2p',
          txid: data.txid
        };
        render();
        iniciarPollingPix(data.txid, 'p2p');
      } catch (err) {
        S.pixModal = null;
        toast('Erro ao gerar Pix: ' + err.message, 'error');
        render();
      }
    }

    async function confirmarVendaP2P(listingId) {
      const { data: listing } = await sb.from('market_listings_brl').select('*').eq('id', listingId).single();
      if (!listing) return;

      if (!confirm(`VOCÊ RECEBEU O PAGAMENTO? \n\nAo confirmar, o grão (${listing.grain_id}) será transferido IMEDIATAMENTE para ${listing.buyer_name}.`)) return;

      // 1. Transferência Real (DB)
      const { error: tErr } = await sb.from('grains').update({ owner: listing.buyer_id }).eq('id', listing.grain_id);
      if (tErr) return toast('Erro na transferência: ' + tErr.message, 'error');

      // 2. Atualizar Listagem
      const { error: lErr } = await sb.from('market_listings_brl').update({
        status: 'sold',
        sold_at: new Date().toISOString()
      }).eq('id', listingId);

      if (lErr) toast('Aviso: Item transferido mas erro ao atualizar histórico.', 'warning');
      else toast('Venda concluída com sucesso! Grão transferido.', 'success');

      render();
    }

    async function cancelarVendaP2P(listingId) {
      if (!confirm('Deseja cancelar este anúncio?')) return;
      const { error } = await sb.from('market_listings_brl').update({ status: 'cancelled' }).eq('id', listingId);
      if (error) toast('Erro ao cancelar: ' + error.message, 'error');
      else render();
    }

    async function abrirDeposito() {
      if (!S.user) return loginWithDiscord();
      const input = document.getElementById('deposit-amount');
      const amount = parseFloat(input?.value || 0);
      if (!amount || amount < 1) return toast('Informe um valor válido', 'warning');

      S.pixModal = { loading: true };
      render();
      try {
        const { data, error } = await sb.functions.invoke('gerar-pix-deposito', {
          body: { valor: amount.toFixed(2) }
        });
        if (error) {
          const body = await error.context?.json?.().catch(() => null);
          throw new Error(body?.error || error.message);
        }
        S.pixModal = { loading: false, qrcode: data.qrcode, copia_e_cola: data.copia_e_cola, txid: data.txid, type: 'deposito', price: amount };
        render();
        iniciarPollingPix(data.txid, 'deposito');
      } catch (e) {
        toast('Erro ao gerar Pix: ' + e.message, 'error');
        S.pixModal = null;
        render();
      }
    }

    async function solicitarSaque() {
      const amountInput = document.getElementById('withdraw-amount');
      const pixInput = document.getElementById('pix-key-input');
      const pixTypeInput = document.getElementById('pix-key-type');

      const amount = parseFloat(amountInput?.value || 0);
      const pixKey = pixInput?.value?.trim();
      const pixKeyType = pixTypeInput?.value || 'manual';

      if (amount < 1) return toast('O valor mínimo para saque é R$ 1,00', 'warning');
      if (!pixKey) return toast('Informe sua chave Pix', 'warning');

      if (!confirm(`Solicitar saque de R$ ${amount.toFixed(2)} para a chave Pix: ${pixKey}?`)) return;

      const { error } = await sb.from('withdrawal_requests').insert({
        user_id: S.user.id,
        username: S.user.global_name || S.user.username,
        amount,
        pix_key: pixKey,
        pix_key_type: pixKeyType,
        status: 'pending'
      });

      if (error) {
        toast('Erro ao solicitar: ' + error.message, 'error');
      } else {
        toast('✅ Solicitação enviada! Enviaremos o PIX em até 24h.', 'success', 6000);
        if (amountInput) amountInput.value = '';
        await go('bank', {}, true);
      }
    }

    async function salvarPixPerfil() {
      const key = document.getElementById('perfil-pix-key')?.value?.trim();
      const type = document.getElementById('perfil-pix-type')?.value || 'manual';
      if (!key) return toast('Informe a chave PIX', 'warning');
      const { error } = await sb.from('users').update({ pix_key: key, pix_key_type: type }).eq('discord_id', S.user.id);
      if (error) return toast('Erro: ' + error.message, 'error');
      if (!S.user_profile) S.user_profile = {};
      S.user_profile.pix_key = key;
      S.user_profile.pix_key_type = type;
      S.editingPix = false;
      toast('Chave PIX salva!', 'success');
      render();

    async function marcarSaquePago(id) {
      if (!confirm('Confirmar pagamento deste saque?')) return;
      const { data: req, error: reqErr } = await sb.from('withdrawal_requests').select('*').eq('id', id).single();
      if (reqErr || !req) { toast('Erro ao buscar saque: ' + (reqErr?.message || 'não encontrado'), 'error'); return; }
      if (req.status !== 'pending') { toast('Este saque já foi processado.', 'warning'); await go('admin', {}, true); return; }

      const { error, count } = await sb.from('withdrawal_requests')
        .update({ status: 'completed', processed_at: new Date().toISOString() })
        .eq('id', id).eq('status', 'pending');
      if (error) { toast('Erro ao atualizar: ' + error.message, 'error'); return; }

      // deduz o saldo do usuário apenas se o update funcionou
      const { data: usr } = await sb.from('users').select('real_balance, total_withdrawn').eq('discord_id', req.user_id).single();
      if (usr) {
        const newBalance = Math.max(0, (usr.real_balance || 0) - req.amount);
        const newWithdrawn = (usr.total_withdrawn || 0) + req.amount;
        await sb.from('users').update({ real_balance: newBalance, total_withdrawn: newWithdrawn }).eq('discord_id', req.user_id);
      }

      AudioEngine.play('success');
      toast('Saque marcado como pago e saldo deduzido!', 'success');
      await go('admin', {}, true);
    }

    function renderMktHistoryGraph(allHistory, selectedRarity, period) {
      const W = 1000, H = 220, PAD = 18;

      // filtro de período
      let cutoff = null;
      const now = Date.now();
      if (period === '24h') cutoff = now - 86400000;
      else if (period === '7d') cutoff = now - 7 * 86400000;
      else if (period === '30d') cutoff = now - 30 * 86400000;
      const filteredHistory = cutoff
        ? (allHistory || []).filter(d => d.sold_at && new Date(d.sold_at).getTime() >= cutoff)
        : (allHistory || []);

      // log scale Y: de R$0.10 a R$300
      const LOG_MIN = Math.log10(0.10);
      const LOG_MAX = Math.log10(300);
      const yScale = p => {
        if (!p || p <= 0) return H - PAD;
        const l = Math.log10(Math.min(Math.max(p, 0.10), 300));
        return H - PAD - ((l - LOG_MIN) / (LOG_MAX - LOG_MIN)) * (H - PAD * 2);
      };

      // agrupar histórico por raridade
      const byRarity = {};
      for (const r of ORDER) byRarity[r] = filteredHistory.filter(d => d.rarity === r);

      const hasSomeData = Object.values(byRarity).some(d => d.length > 0);

      // linhas de grade de preço (referência)
      const gridPrices = [0.25, 1, 5, 15, 40, 80, 200];
      const gridLines = gridPrices.map(p => {
        const y = yScale(p);
        return `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,6"/>
                <text x="4" y="${y - 2}" fill="#374151" font-size="11" font-family="monospace">R$${p < 1 ? p.toFixed(2) : p >= 100 ? p.toFixed(0) : p}</text>`;
      }).join('');

      // desenha cada série
      const series = ORDER.map(r => {
        const color = RARITY[r].color;
        const sales = byRarity[r];
        const baseP = BASE_PRICE[r];
        const isSelected = !selectedRarity || selectedRarity === r;
        const opacity = isSelected ? 1 : 0.1;

        let svg = '';

        if (sales.length === 0) {
          // só ponto base
          if (baseP == null) return '';
          const cy = yScale(baseP);
          const cx = W / 2;
          svg += `<circle cx="${cx}" cy="${cy}" r="6" fill="${color}" fill-opacity="${opacity}" stroke="#111" stroke-width="1.5"/>`;
          if (isSelected) svg += `<text x="${cx + 10}" y="${cy + 4}" fill="${color}" font-size="11" font-family="monospace" opacity="${opacity}">R$${baseP.toFixed(2)}</text>`;
        } else {
          // linha de histórico + ponto base tracejado
          const pts = sales.map((d, i) => {
            const x = PAD + (i / Math.max(sales.length - 1, 1)) * (W - PAD * 2);
            const y = yScale(parseFloat(d.price));
            return [x, y];
          });

          // linha base tracejada (referência)
          if (baseP != null) {
            const by = yScale(baseP);
            svg += `<line x1="0" y1="${by}" x2="${W}" y2="${by}" stroke="${color}" stroke-width="1" stroke-dasharray="3,8" opacity="${opacity * 0.4}"/>`;
          }

          // área preenchida
          if (pts.length >= 2) {
            const area = `M ${pts[0][0]},${H - PAD} ` + pts.map(p => `L ${p[0]},${p[1]}`).join(' ') + ` L ${pts[pts.length-1][0]},${H - PAD} Z`;
            svg += `<path d="${area}" fill="${color}" fill-opacity="${opacity * 0.08}"/>`;
            svg += `<polyline points="${pts.map(p => p.join(',')).join(' ')}" fill="none" stroke="${color}" stroke-width="${isSelected ? 2.5 : 1.5}" stroke-linejoin="round" stroke-linecap="round" opacity="${opacity}"/>`;
          }

          pts.forEach((p, i) => {
            const price = parseFloat(sales[i].price);
            svg += `<circle cx="${p[0]}" cy="${p[1]}" r="${isSelected ? 5 : 3}" fill="${color}" fill-opacity="${opacity}" stroke="#111" stroke-width="1"><title>${RARITY[r].label}: R$ ${price.toFixed(2)}</title></circle>`;
          });

          // label do último ponto se selecionado
          if (isSelected && pts.length > 0) {
            const lp = pts[pts.length - 1];
            const lPrice = parseFloat(sales[sales.length - 1].price);
            svg += `<text x="${lp[0] + 8}" y="${lp[1] + 4}" fill="${color}" font-size="11" font-family="monospace">R$${lPrice.toFixed(2)}</text>`;
          }
        }
        return svg;
      }).join('');

      if (!hasSomeData && !ORDER.some(r => BASE_PRICE[r] != null)) {
        return `<div class="absolute inset-0 flex items-center justify-center text-gray-600 text-[10px]">Sem dados</div>`;
      }

      return `<svg viewBox="0 0 ${W} ${H}" class="w-full h-full" preserveAspectRatio="none">
        ${gridLines}
        ${series}
      </svg>`;
    }

    window.updateForgePreview = function () {
      const sel = document.getElementById('evt-forge-sel');
      if (!sel) return;
      window.evtSelections.forge.clear();

      const v = sel.value;
      const idx = ORDER.indexOf(v);
      const el = document.getElementById('forge-preview');
      const listEl = document.getElementById('forge-item-list');

      if (idx >= 2) {
        const pR = ORDER[idx - 1];
        if (el) el.innerHTML = `Sucesso: <span style="color:${RARITY[pR].color}" class="font-bold">${RARITY[pR].emoji} 1x ${RARITY[pR].label}</span>`;
        window.renderEvtList(v, 'forge', listEl);
      } else {
        if (el) el.innerHTML = '';
        if (listEl) listEl.innerHTML = '<div class="text-[10px] text-gray-600 w-full text-center py-4">Selecione o material acima</div>';
      }
      window.updateEvtBtn('forge');
    };

    window.updateGachaPreview = function () {
      const sel = document.getElementById('evt-gacha-sel');
      if (!sel) return;
      window.evtSelections.gacha.clear();
      const listEl = document.getElementById('gacha-item-list');
      if (sel.value) window.renderEvtList(sel.value, 'gacha', listEl);
      else if (listEl) listEl.innerHTML = '<div class="text-[10px] text-gray-600 w-full text-center py-4">Selecione o material acima</div>';
      window.updateEvtBtn('gacha');
    };

    window.renderEvtList = function (rarityId, type, container) {
      const items = window.evtAvailable.filter(g => g.rarity === rarityId);
      // Sort by nonce so user can pick lowest/highest easily
      items.sort((a, b) => (a.nonce || 0) - (b.nonce || 0));

      container.innerHTML = items.map(g => {
        const isSel = window.evtSelections[type].has(g.id);
        const color = RARITY[rarityId].color;
        const colorHex = isSel ? color : '#374151'; // gray-700
        const bgHex = isSel ? color + '30' : 'transparent';

        return `<button onclick="window.toggleEvtGrain('${g.id}', '${type}')" id="evt-btn-${type}-${g.id}"
          class="px-2 py-1 border rounded text-[10px] font-mono transition-colors flex flex-col items-center hover:bg-gray-800"
          style="border-color:${colorHex}; background:${bgHex}; color:${isSel ? '#fff' : '#9ca3af'}">
          <span>${g.id}</span>
          <span class="text-[8px] opacity-70">N: ${g.nonce || 0}</span>
        </button>`;
      }).join('');
    };

    window.toggleEvtGrain = function (grainId, type) {
      const set = window.evtSelections[type];
      const max = type === 'forge' ? 10 : 5;

      if (set.has(grainId)) {
        set.delete(grainId);
      } else {
        if (set.size >= max) return; // limit reached
        set.add(grainId);
      }

      // Update specific button visually
      const btn = document.getElementById(`evt-btn-${type}-${grainId}`);
      if (btn) {
        const selVal = document.getElementById(`evt-${type}-sel`).value;
        const color = RARITY[selVal].color;
        const isSel = set.has(grainId);
        btn.style.borderColor = isSel ? color : '#374151';
        btn.style.background = isSel ? color + '30' : 'transparent';
        btn.style.color = isSel ? '#fff' : '#9ca3af';
      }

      window.updateEvtBtn(type);
    };

    window.updateEvtBtn = function (type) {
      const max = type === 'forge' ? 10 : 5;
      const set = window.evtSelections[type];
      const btn = document.getElementById(`btn-${type}`);
      const countEl = document.getElementById(`${type}-sel-count`);
      if (countEl) countEl.textContent = `${set.size} / ${max} selecionados`;
      if (btn) btn.disabled = (set.size !== max);
    };

    window.doEventAction = async function (type) {
      if (S.mining) { toast('Não pode usar o evento enquanto minera!', 'error'); return; }

      const isForge = type === 'forge';
      const selId = isForge ? 'evt-forge-sel' : 'evt-gacha-sel';
      const sel = document.getElementById(selId);
      if (!sel || !sel.value) return;

      const costRarity = sel.value;
      const costQty = isForge ? 10 : 5;
      const idx = ORDER.indexOf(costRarity);
      if (idx < 2) return;

      const set = window.evtSelections[type];
      if (set.size !== costQty) return;

      const btn = document.getElementById(`btn-${type}`);
      btn.disabled = true;
      const origTxt = btn.innerHTML;
      btn.innerHTML = isForge ? '🔨 Batendo...' : '🎰 Girando...';
      if (!isForge) btn.classList.add('animate-pulse');
      else btn.classList.add('shake-anim');

      const toBurn = Array.from(set);
      for (const id of toBurn) {
        await db.grains.where('id').equals(id).modify({ owner: '__burned__' });
        await sb.from('grains').update({ owner: '__burned__' }).eq('id', id);
      }

      await new Promise(r => setTimeout(r, 1200));

      let winRarity = null;

      if (isForge) {
        if (Math.random() < 0.5) winRarity = ORDER[idx - 1];
      } else {
        const roll = Math.random() * 100;
        let targetTierBoost = 0;
        if (roll < 0.05) targetTierBoost = 5;
        else if (roll < 0.15) targetTierBoost = 4;
        else if (roll < 0.45) targetTierBoost = 3;
        else if (roll < 1.95) targetTierBoost = 2;
        else if (roll < 19.95) targetTierBoost = 1;

        if (targetTierBoost > 0) {
          const targetIdx = Math.max(1, idx - targetTierBoost);
          winRarity = ORDER[targetIdx];
        }
      }

      btn.classList.remove('shake-anim', 'animate-pulse');
      btn.disabled = false;
      btn.innerHTML = origTxt;

      if (winRarity) {
        const newId = await nextId(winRarity);
        const g = {
          id: newId, rarity: winRarity, hash: 'EVENT_' + await sha256(Date.now() + S.user.id + Math.random()),
          nonce: Math.floor(Math.random() * 10) + 1,
          generated_at: Date.now(), discord_user: S.user.global_name || S.user.username, discord_id: S.user.id,
          network_size_at_generation: S.networkSize, owner: S.user.id, transfer_history: []
        };
        g.signature = await signGrain(g);
        await db.grains.add(g);
        sbUpsertGrain(g);

        spawnParticles(winRarity);
        toast(`🎉 SUCESSO! Você obteve 1x ${RARITY[winRarity].emoji} ${RARITY[winRarity].label}!`, 'success', 6000);
      } else {
        toast(`💥 FALHOU! Seus grãos viraram cinzas...`, 'error', 4000);
      }

      window.evtSelections[type].clear();
      if (S.user) S.data.inventory = await db.grains.where('owner').equals(S.user.id).toArray();
      render();
    };
