<head>

    *{font-family:'JetBrains Mono',monospace}
    :root{--brass:#CD7F32;--copper:#B87333;--silver:#C0C0C0;--gold:#FFD700;--diamond:#00FFFF}
    .card-brass{background:linear-gradient(135deg,#1a1208,#251a0e);border:1px solid #CD7F32}
    .card-copper{background:linear-gradient(135deg,#1a1008,#25180d);border:1px solid #B87333}
    .card-silver{background:linear-gradient(135deg,#111318,#1c2028);border:1px solid #C0C0C0}
    .card-gold{background:linear-gradient(135deg,#1a1500,#2a2200);border:1px solid #FFD700}

    @keyframes diamondGlow{0%,100%{box-shadow:0 0 6px #00FFFF50,0 0 12px #00FFFF20}50%{box-shadow:0 0 20px #00FFFFa0,0 0 40px #00FFFF50,0 0 70px #00FFFF20}}
    @keyframes miningPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

    .shine-effect::after{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:linear-gradient(45deg,transparent 35%,rgba(255,255,255,0.08) 50%,transparent 65%);animation:shine 4s ease-in-out infinite}

<body class="bg-gray-950 text-gray-100 min-h-screen">

<div id="app" class="max-w-6xl mx-auto"></div>
<div id="toasts" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>
<div id="particles" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONFIG вҖ” edite DISCORD_CLIENT_ID para seu app Discord
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const CFG = {
  DISCORD_CLIENT_ID: '1495818274594754711',
  get REDIRECT_URI(){ return window.location.origin + window.location.pathname },
  BASE_COOLDOWN_MS: 5 * 60 * 1000,
  CHUNK_SIZE: 800,
  PEER_CFG: { host:'0.peerjs.com', port:443, secure:true, path:'/' }
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RARIDADES
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const RARITY = {
  brass:   { key:'brass',   label:'LatГЈo',    emoji:'рҹ”¶', color:'#CD7F32', zeros:1, prefix:'L' },
  copper:  { key:'copper',  label:'Cobre',    emoji:'рҹҹӨ', color:'#B87333', zeros:2, prefix:'C' },
  silver:  { key:'silver',  label:'Prata',    emoji:'вҡӘ', color:'#C0C0C0', zeros:3, prefix:'S' },
  gold:    { key:'gold',    label:'Ouro',     emoji:'рҹҹЎ', color:'#FFD700', zeros:4, prefix:'G' },
  diamond: { key:'diamond', label:'Diamante', emoji:'рҹ’Һ', color:'#00FFFF', zeros:5, prefix:'D' }
};
const ORDER = ['diamond','gold','silver','copper','brass'];

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// DATABASE (Dexie / IndexedDB)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const db = new Dexie('GraoNet_v1');
db.version(1).stores({
  grains:    '++localId, id, rarity, owner, generated_at',
  counters:  'rarity',
  transfers: '++id, grainId, from_user, to_user, timestamp',
  settings:  'key'
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ESTADO GLOBAL
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const S = {
  user: null,
  page: 'inventory',
  params: {},
  filter: 'all',
  mining: false,
  miningProgress: 0,
  hashrate: 0,
  miningCancelled: false,
  networkSize: 1,
  peers: new Map(),
  peerId: null,
  transferTarget: ''
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CRIPTO
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function leadingZeros(h){ let n=0; for(const c of h){if(c==='0')n++;else break} return n }

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// DIFICULDADE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function diffOffset(){ return Math.floor(S.networkSize / 50) }
// 5min base + 1min por nГі adicional, mГЎx 60min
function cooldownMs(){ return Math.min(CFG.BASE_COOLDOWN_MS + (S.networkSize - 1) * 60000, 60 * 60 * 1000) }
function minZeros(){ return 1 + diffOffset() }
function rarityForZeros(z){
  const o = diffOffset();
  if(z >= 5+o) return 'diamond';
  if(z >= 4+o) return 'gold';
  if(z >= 3+o) return 'silver';
  if(z >= 2+o) return 'copper';
  if(z >= 1+o) return 'brass';
  return null;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// IDs DOS GRГғOS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function nextId(rarity){
  const pfx = RARITY[rarity].prefix;
  const rec = await db.counters.get(rarity);
  const n   = (rec?.count || 0) + 1;
  await db.counters.put({ rarity, count: n });
  return `grГЈo#${pfx}${String(n).padStart(2,'0')}`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ASSINATURA
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function signGrain(g){
  return sha256(`${g.id}${g.hash}${g.discord_id}${g.generated_at}`);
}
async function verifyGrain(g){
  return g.signature === await signGrain(g);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// MINERAГҮГғO
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function startMining(){
  if(!S.user){ toast('FaГ§a login primeiro!','error'); return }
  if(S.mining) return;

  const lastMine = await db.settings.get('lastMine');
  if(lastMine){
    const elapsed = Date.now() - lastMine.value;
    if(elapsed < cooldownMs()){
      const mins = Math.ceil((cooldownMs() - elapsed)/60000);
      toast(`Cooldown: ${mins} minuto(s) restante(s)`,'warning');
      return;
    }
  }

  S.mining = true;
  S.miningCancelled = false;
  S.miningProgress = 0;
  S.hashrate = 0;
  render();

  const base      = `${S.user.id}:${Date.now()}`;
  let nonce       = 0;
  let start       = Date.now();
  let found       = null;
  let foundHash   = '';

  const tick = async () => {
    if(S.miningCancelled){ S.mining=false; render(); return }

    for(let i=0;i<CFG.CHUNK_SIZE;i++){
      if(S.miningCancelled) break;
      const h = await sha256(`${base}:${nonce}`);
      const z = leadingZeros(h);
      const r = rarityForZeros(z);
      if(r){ found=r; foundHash=h; break }
      nonce++;
    }

    const secs = (Date.now()-start)/1000;
    S.hashrate  = Math.round(nonce/Math.max(secs,0.001));
    S.miningProgress = Math.min(94, (nonce/100000)*100);

    if(found){
      await finishMining(foundHash, found, nonce);
    } else {
      render();
      setTimeout(tick, 0);
    }
  };
  setTimeout(tick, 0);
}

async function finishMining(hash, rarity, nonce){
  const id   = await nextId(rarity);
  const user = S.user;
  const grain = {
    id, rarity, hash, nonce,
    generated_at: Date.now(),
    discord_user: user.global_name || user.username || user.id,
    discord_id: user.id,
    network_size_at_generation: S.networkSize,
    owner: user.id,
    transfer_history: []
  };
  grain.signature = await signGrain(grain);
  await db.grains.add(grain);
  await db.settings.put({ key:'lastMine', value: Date.now() });

  S.mining = false;
  S.miningProgress = 100;
  spawnParticles(rarity);
  broadcastGrain(grain);
  toast(`рҹҺү ${id} minerado! (${RARITY[rarity].label})`,'success',5000);
  setTimeout(()=>{ S.miningProgress=0; render() }, 2500);
  render();
}

function cancelMining(){ S.miningCancelled = true }

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// PARTГҚCULAS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function spawnParticles(rarity){
  const c   = document.getElementById('particles');
  if(!c) return;
  const col = RARITY[rarity]?.color || '#fff';
  const num = rarity==='diamond'?60 : rarity==='gold'?40 : 25;
  for(let i=0;i<num;i++){
    const p = document.createElement('div');
    p.className='particle';
    const ang = Math.random()*Math.PI*2;
    const dist = 80 + Math.random()*200;
    p.style.cssText=`background:${col};left:50%;top:50%;
      --dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;
      animation-delay:${Math.random()*0.4}s;
      box-shadow:0 0 4px ${col};`;
    c.appendChild(p);
    setTimeout(()=>p.remove(), 1600);
  }
}

// DISCORD AUTH

function loginWithDiscord(){
  if(CFG.DISCORD_CLIENT_ID === 'YOUR_DISCORD_CLIENT_ID_HERE'){
    // Demo mode
    S.user = { id:'demo_'+Date.now(), username:'DemoUser', global_name:'Demo User', discriminator:'0', avatar:null };
    db.settings.put({ key:'discordUser', value: S.user });
    toast('Modo demo ativado! Configure DISCORD_CLIENT_ID para login real.','info',6000);
    render();
    initPeer();
    return;
  }
  const url = `https://discord.com/api/oauth2/authorize`+
    `?client_id=${CFG.DISCORD_CLIENT_ID}`+
    `&redirect_uri=${encodeURIComponent(CFG.REDIRECT_URI)}`+
    `&response_type=token&scope=identify`;
  window.location.href = url;
}

async function handleDiscordCallback(){
  const hash = window.location.hash;
  if(!hash || !hash.includes('access_token')) return false;
  const p = new URLSearchParams(hash.slice(1));
  const tk = p.get('access_token');
  if(!tk) return false;
  try{
    const res  = await fetch('https://discord.com/api/users/@me',{ headers:{ Authorization:`Bearer ${tk}` }});
    const user = await res.json();
    if(!user.id) throw new Error('bad response');
    S.user = user;
    await db.settings.put({ key:'discordUser', value: user });
    history.replaceState(null,'', window.location.pathname);
    toast(`Bem-vindo, ${user.global_name||user.username}!`,'success');
    return true;
  }catch(e){
    toast('Erro ao autenticar com Discord','error');
    return false;
  }
}

function logout(){
  S.user = null;
  if(window._peer) try{ window._peer.destroy() }catch(e){}
  db.settings.delete('discordUser');
  render();
}

// TRANSFERГҠNCIA P2P
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function generateTransferPkg(grainId, targetId){
  const g = await db.grains.where('id').equals(grainId).first();
  if(!g){ toast('GrГЈo nГЈo encontrado','error'); return null }
  if(g.owner !== S.user.id){ toast('VocГӘ nГЈo Г© o dono','error'); return null }

  const pkg = {
    type: 'graonet_transfer', version:'1.0',
    grain: { ...g },
    from: S.user.id,
    from_username: g.discord_user,
    to: targetId,
    timestamp: Date.now(),
    nonce: crypto.randomUUID()
  };
  const raw = `${g.id}:${pkg.from}:${pkg.to}:${pkg.timestamp}:${pkg.nonce}`;
  pkg.sig = await sha256(raw);
  return JSON.stringify(pkg, null, 2);
}

async function receivePkg(json){
  let pkg;
  try{ pkg = JSON.parse(json) }
  catch(e){ toast('JSON invГЎlido','error'); return false }
  if(pkg.type !== 'graonet_transfer'){ toast('Tipo invГЎlido','error'); return false }
  if(!S.user || pkg.to !== S.user.id){ toast('Este pacote nГЈo Г© para vocГӘ','error'); return false }

  const raw  = `${pkg.grain.id}:${pkg.from}:${pkg.to}:${pkg.timestamp}:${pkg.nonce}`;
  const exp  = await sha256(raw);
  if(pkg.sig !== exp){ toast('Assinatura invГЎlida!','error'); return false }

  const existing = await db.grains.where('id').equals(pkg.grain.id).first();
  const updated  = {
    ...pkg.grain,
    owner: S.user.id,
    transfer_history: [...(pkg.grain.transfer_history||[]), {
      from: pkg.from_username, to: S.user.id, timestamp: pkg.timestamp
    }]
  };
  if(existing){ await db.grains.where('id').equals(pkg.grain.id).modify(updated) }
  else         { await db.grains.add(updated) }

  await db.transfers.add({ grainId:pkg.grain.id, from_user:pkg.from, to_user:S.user.id, timestamp:pkg.timestamp });
  toast(`${pkg.grain.id} recebido de ${pkg.from_username}!`,'success',5000);
  render();
  return true;
}

// REDE P2P (PeerJS)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function initPeer(){
  if(!S.user || window._peer) return;
  const pid = `graonet-${S.user.id}`.replace(/[^a-zA-Z0-9\-_]/g,'_');
  try{
    const peer = new Peer(pid, CFG.PEER_CFG);
    window._peer = peer;
    peer.on('open', id =>{ S.peerId=id; syncNetwork(); updateHeader() });
    peer.on('connection', conn => setupConn(conn));
    peer.on('error', ()=>{});
  }catch(e){}
}

function setupConn(conn){
  conn.on('open',()=>{
    S.peers.set(conn.peer, conn);
    S.networkSize = Math.max(S.networkSize, S.peers.size+1);
    conn.send({ type:'hello', userId: S.user?.id });
    updateHeader();
  });
  conn.on('data', d => handlePeerData(conn, d));
  conn.on('close',()=>{ S.peers.delete(conn.peer); updateNetSize(); updateHeader() });
}

async function handlePeerData(conn, d){
  if(d.type==='hello'){
    const ctrs = await db.counters.toArray();
    conn.send({ type:'counters', data: ctrs });
    S.networkSize = Math.max(S.networkSize, S.peers.size+1);
  }
  if(d.type==='counters'){
    for(const c of d.data||[]){
      const loc = await db.counters.get(c.rarity);
      if(!loc || c.count > loc.count) await db.counters.put(c);
    }
  }
  if(d.type==='new_grain') S.networkSize = Math.max(S.networkSize, d.net||1);
}

function broadcastGrain(g){
  for(const [,c] of S.peers){
    try{ c.send({ type:'new_grain', rarity:g.rarity, net: S.networkSize }) }catch(e){}
  }
}
function updateNetSize(){ S.networkSize = Math.max(1, S.peers.size+1) }
function syncNetwork(){ updateNetSize() }
function updateHeader(){
  const el = document.getElementById('net-size');
  if(el) el.textContent = `${S.networkSize} nГі${S.networkSize!==1?'s':''}`;
}

// EXPORT / IMPORT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function exportBackup(){
  const grains   = await db.grains.where('owner').equals(S.user.id).toArray();
  const counters = await db.counters.toArray();
  const data = JSON.stringify({ type:'graonet_backup', version:'1.0', user:S.user, exported_at:Date.now(), grains, counters }, null, 2);
  const a = Object.assign(document.createElement('a'),{
    href: URL.createObjectURL(new Blob([data],{type:'application/json'})),
    download: `graonet-backup-${Date.now()}.json`
  });
  a.click();
  toast('Backup exportado!','success');
}

async function importBackup(file){
  if(!file) return;
  let bk;
  try{ bk = JSON.parse(await file.text()) }
  catch(e){ toast('Arquivo invГЎlido','error'); return }
  if(bk.type !== 'graonet_backup'){ toast('Formato invГЎlido','error'); return }
  let added=0;
  for(const g of bk.grains||[]){
    const ex = await db.grains.where('id').equals(g.id).first();
    if(!ex){ await db.grains.add(g); added++ }
  }
  for(const c of bk.counters||[]){
    const loc = await db.counters.get(c.rarity);
    if(!loc || c.count > loc.count) await db.counters.put(c);
  }
  toast(`Importado! ${added} grГЈo(s) novo(s) adicionado(s)`,'success',5000);
  render();
}

// TOASTS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function toast(msg, type='info', dur=3000){
  const c = document.getElementById('toasts'); if(!c) return;
  const cls = { success:'bg-green-900 border-green-600 text-green-100', error:'bg-red-900 border-red-600 text-red-100',
    warning:'bg-yellow-900 border-yellow-600 text-yellow-100', info:'bg-blue-900 border-blue-600 text-blue-100' };
  const el = document.createElement('div');
  el.className=`px-4 py-2 rounded border text-sm pointer-events-auto shadow-lg ${cls[type]||cls.info}`;
  el.style.animation='fadeIn 0.2s ease forwards';
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300) }, dur);
}

async function pageMine(){
  if(!S.user) return pageLogin();
  const lastMine = await db.settings.get('lastMine');
  const cdMs  = cooldownMs();
  let cd = null;
  if(lastMine){
    const el = Date.now()-lastMine.value;
    if(el < cdMs){ const r=cdMs-el; cd=`${Math.floor(r/60000)}m ${Math.floor((r%60000)/1000)}s` }
  }
  const off      = diffOffset();
  const cdMins   = Math.round(cdMs/60000);
  const myGrains = await db.grains.where('owner').equals(S.user.id).toArray();
  const counts   = {};
  for(const r of ORDER) counts[r] = myGrains.filter(g=>g.rarity===r).length;
  const sorted   = [...myGrains].sort((a,b)=>ORDER.indexOf(a.rarity)-ORDER.indexOf(b.rarity));

  return `<div class="p-4 sm:p-6 max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-1">вӣҸпёҸ MineraГ§ГЈo</h2>

      <div class="text-gray-400 text-xs">Zeros mГӯn.<br><span class="text-orange-400 text-sm font-bold">${minZeros()}</span></div>
    </div>

      <div class="text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-wide">Tabela de Raridade</div>

        <div>Raridade</div><div class="text-center">Zeros</div><div class="text-center">Chance</div><div class="text-right">Seus</div>
      </div>
      ${ORDER.map(r=>{
        const z    = RARITY[r].zeros + off;
        const prob = z<=3 ? (1/Math.pow(16,z)*100).toFixed(2)+'%' : z===4 ? '~0.0015%' : '~0.0001%';
        return `<div class="grid grid-cols-4 items-center py-1 border-b border-gray-800/40 text-xs">
          <span class="flex items-center gap-1">${RARITY[r].emoji}<span style="color:${RARITY[r].color}">${RARITY[r].label}</span></span>
          <span class="text-center font-mono text-gray-400">${z}+</span>
          <span class="text-center text-[10px] text-gray-500">${prob}</span>
          <span class="text-right font-bold" style="color:${RARITY[r].color}">${counts[r]||0}</span>
        </div>`;
      }).join('')}
      ${off>0?`<div class="text-[10px] text-yellow-700 mt-2">вҡ  Dificuldade +${off} pela rede crescente</div>`:''}
    </div>

    ${sorted.length>0?`<div class="bg-gray-900 rounded-lg p-4 mb-4">
      <div class="text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-wide">Seus GrГЈos (${sorted.length})</div>
      <div class="flex flex-wrap gap-1 max-h-24 overflow-y-auto scrollbar-thin">
        ${sorted.map(g=>`<span onclick="go('grain',{id:'${g.id}'})" title="${new Date(g.generated_at).toLocaleDateString('pt-BR')}"
          class="cursor-pointer px-2 py-0.5 rounded text-[10px] font-mono border hover:brightness-125 transition-all"
          style="color:${RARITY[g.rarity].color};border-color:${RARITY[g.rarity].color}40;background:${RARITY[g.rarity].color}10">
          ${RARITY[g.rarity].emoji} ${g.id}
        </span>`).join('')}
      </div>
    </div>`:''}

    ${(cd && !S.mining)?`<div class="bg-gray-900 border border-yellow-800/50 rounded-lg p-5 text-center">
      <div class="text-3xl mb-2">вҸі</div>
      <div class="text-yellow-400 font-bold mb-1">Cooldown Ativo</div>
      <div class="text-gray-400 text-sm">PrГіxima mineraГ§ГЈo em: <span id="cd-timer" class="font-mono text-white">${cd}</span></div>
      <div class="text-[10px] text-gray-600 mt-2">Cooldown base: 5min В· +1min por nГі na rede</div>
    </div>`:`<div class="bg-gray-900 rounded-lg p-6 text-center">
      ${S.mining?`<div class="text-5xl mb-3 mining-active">вӣҸпёҸ</div>

async function pageRanking(){
  const all = await db.grains.toArray();
  const map = {};
  for(const g of all){
    const uid = g.owner || g.discord_id || 'unknown';
    if(!map[uid]) map[uid] = { name: g.discord_user||uid, counts:{diamond:0,gold:0,silver:0,copper:0,brass:0} };
    if(g.rarity) map[uid].counts[g.rarity]++;
  }
  const score = u => u.counts.diamond*1000+u.counts.gold*100+u.counts.silver*10+u.counts.copper*2+u.counts.brass;
  const users = Object.entries(map).sort((a,b)=>score(b[1])-score(a[1]));
  return `<div class="p-4 sm:p-6 max-w-3xl mx-auto">
    <h2 class="text-2xl font-bold mb-1">рҹҸҶ Ranking</h2>
    <p class="text-gray-400 text-sm mb-5">Top holders вҖ” baseado nos grГЈos no seu inventГЎrio local.</p>
    <div class="bg-gray-900 rounded-lg overflow-hidden">
      <div class="grid grid-cols-8 gap-1 px-4 py-2 text-[10px] text-gray-600 border-b border-gray-800">
        <div class="col-span-3">UsuГЎrio</div>
        ${ORDER.map(r=>`<div class="text-center">${RARITY[r].emoji}</div>`).join('')}
        <div class="text-right">Pts</div>
      </div>
      ${users.length===0?`<div class="text-center py-8 text-gray-600 text-sm">Sem dados</div>`
        :users.slice(0,50).map(([uid,d],i)=>{
          const sc  = score(d);
          const me  = uid===S.user?.id;
          const med = i===0?'рҹҘҮ':i===1?'рҹҘҲ':i===2?'рҹҘү':`${i+1}`;
          return `<div class="grid grid-cols-8 gap-1 px-4 py-2 text-xs border-b border-gray-800 hover:bg-gray-800/50 transition-colors ${me?'bg-gray-800/30':''}">
            <div class="col-span-3 flex items-center gap-1 min-w-0">
              <span>${med}</span>
              <span class="${me?'text-cyan-400':'text-gray-300'} truncate text-[11px]">${d.name}</span>
            </div>
            ${ORDER.map(r=>`<div class="text-center" style="color:${RARITY[r].color}">${d.counts[r]||'вҖ“'}</div>`).join('')}
            <div class="text-right text-yellow-400 font-bold">${sc.toLocaleString()}</div>
          </div>`;
        }).join('')}
    </div>
    <div class="mt-3 text-[10px] text-gray-600 text-center">рҹ’ҺГ—1000 + рҹҹЎГ—100 + вҡӘГ—10 + рҹҹӨГ—2 + рҹ”¶Г—1</div>
  </div>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// HANDLERS DOM
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function setFilter(r){ S.filter=r; render() }

async function doGenerateTransfer(){
  const target = document.getElementById('tr-target')?.value?.trim();
  const grain  = document.getElementById('tr-grain')?.value;
  if(!target){ toast('Informe o Discord ID do destinatГЎrio','error'); return }
  if(!grain) { toast('Selecione um grГЈo','error'); return }
  if(target === S.user.id){ toast('NГЈo pode transferir para si mesmo','error'); return }
  const pkg = await generateTransferPkg(grain, target);
  if(pkg){
    await db.grains.where('id').equals(grain).modify({ owner: '__transferred__' });
    const out = document.getElementById('tr-out');
    const ta  = document.getElementById('tr-pkg');
    if(out && ta){ out.classList.remove('hidden'); ta.value=pkg }
    toast('Pacote gerado! Copie e envie ao destinatГЎrio.','success',5000);
    // Refresh select
    const sel = document.getElementById('tr-grain');
    if(sel){ const op=sel.querySelector(`[value="${grain}"]`); if(op) op.remove() }
  }
}

async function doReceive(){
  const t = document.getElementById('tr-rcv')?.value?.trim();
  if(!t){ toast('Cole o pacote de transferГӘncia','error'); return }
  const ok = await receivePkg(t);
  if(ok){ const el=document.getElementById('tr-rcv'); if(el) el.value='' }
}

function copyPkg(){
  const ta = document.getElementById('tr-pkg');
  if(!ta) return;
  navigator.clipboard.writeText(ta.value)
    .then(()=>toast('Copiado!','success',1500))
    .catch(()=>{ ta.select(); document.execCommand('copy'); toast('Copiado!','success',1500) });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// TIMER DE COOLDOWN
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function startCdTimer(){
  const tick = async () => {
    const el = document.getElementById('cd-timer');
    if(!el) return;
    const lm = await db.settings.get('lastMine');
    if(!lm) return;
    const rem = cooldownMs() - (Date.now()-lm.value);
    if(rem <= 0){ render(); return }
    el.textContent = `${Math.floor(rem/60000)}m ${Math.floor((rem%60000)/1000)}s`;
    setTimeout(tick, 1000);
  };
  setTimeout(tick, 500);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER PRINCIPAL
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function render(){
  const app = document.getElementById('app');
  if(!app) return;
  let body = '';
  try{
    switch(S.page){
      case 'inventory': body = await pageInventory(); break;
      case 'mine':      body = await pageMine(); break;
      case 'transfer':  body = await pageTransfer(); break;
      case 'ranking':   body = await pageRanking(); break;
      case 'grain':     body = await pageGrain(S.params.id); break;
      default:          body = await pageInventory();
    }
  }catch(e){ body=`<div class="p-6 text-red-400">Erro: ${e.message}</div>` }
  app.innerHTML = renderHeader() + `<main class="fade-in">${body}</main>`;
  if(S.page==='mine' && !S.mining) startCdTimer();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// INICIALIZAГҮГғO
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function init(){
  const fromDiscord = await handleDiscordCallback();
  if(!fromDiscord){
    const saved = await db.settings.get('discordUser');
    if(saved?.value) S.user = saved.value;
  }
  await render();
  if(S.user) initPeer();

  // Re-render mining progress every 800ms
  setInterval(()=>{ if(S.page==='mine' && S.mining) render() }, 800);
}

init();
</script>
