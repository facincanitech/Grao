    async function doGenerateTransfer() {
      let target = document.getElementById('tr-target')?.value?.trim();
      if (!target) target = 'ANYONE';
      const grain = document.getElementById('tr-grain')?.value;
      if (!grain) { toast('Selecione um grão', 'error'); return }
      if (target === S.user.id) { toast('Não pode transferir para si mesmo', 'error'); return }
      const pkg = await generateTransferPkg(grain, target);
      if (pkg) {
        const outStatus = target === 'ANYONE' ? '__exported__' : '__transferred__';
        await db.grains.where('id').equals(grain).modify({ owner: outStatus });
        await sb.from('grains').update({ owner: outStatus }).eq('id', grain);

        const out = document.getElementById('tr-out');
        const ta = document.getElementById('tr-pkg');
        if (out && ta) { out.classList.remove('hidden'); ta.value = pkg }
        if (target === 'ANYONE') {
          toast('Código de Resgate Livre Gerado! Guarde com cuidado.', 'warning', 6000);
        } else {
          toast('Pacote gerado! Copie e envie ao destinatário.', 'success', 5000);
        }
        // Refresh select
        const sel = document.getElementById('tr-grain');
        if (sel) { const op = sel.querySelector(`[value="${grain}"]`); if (op) op.remove() }
      }
    }

    async function doReceive() {
      const t = document.getElementById('tr-rcv')?.value?.trim();
      if (!t) { toast('Cole o pacote de transferência', 'error'); return }
      const ok = await receivePkg(t);
      if (ok) { const el = document.getElementById('tr-rcv'); if (el) el.value = '' }
    }

    function copyPkg() {
      const ta = document.getElementById('tr-pkg');
      if (!ta) return;
      navigator.clipboard.writeText(ta.value)
        .then(() => toast('Copiado!', 'success', 1500))
        .catch(() => { ta.select(); document.execCommand('copy'); toast('Copiado!', 'success', 1500) });
    }

    // ═══════════════════════════════════════════════════════
    // TIMER DE COOLDOWN
    // ═══════════════════════════════════════════════════════
    const AC_DURATION = 60 * 60 * 1000; // 1 hora por sessão
    function acMaxSessions() { return S.is_vip ? 10 : 3; }
    function acRemaining() { return Math.max(0, acMaxSessions() - S.acUsed); }
    function todayStr() { return new Date().toISOString().slice(0, 10); }

    async function loadAcState() {
      const d = await db.settings.get('acDate');
      const u = await db.settings.get('acUsed');
      const today = todayStr();
      if (d?.value !== today) {
        S.acDate = today;
        S.acUsed = 0;
        await db.settings.put({ key: 'acDate', value: today });
        await db.settings.put({ key: 'acUsed', value: 0 });
      } else {
        S.acDate = today;
        S.acUsed = u?.value || 0;
      }
    }

    async function toggleAutoClicker() {
      if (S.autoClicker) {
        S.autoClicker = false;
        S.acSessionStart = 0;
        render();
        return;
      }
      await loadAcState();
      if (acRemaining() <= 0) {
        toast(`Limite de sessões atingido hoje (${acMaxSessions()}x). Volte amanhã!`, 'warning', 4000);
        return;
      }
      S.autoClicker = true;
      S.acSessionStart = Date.now();
      render();
      startMining(true);
    }

    async function checkAcSession() {
      if (!S.autoClicker || !S.acSessionStart) return;
      if (Date.now() - S.acSessionStart >= AC_DURATION) {
        S.autoClicker = false;
        S.acSessionStart = 0;
        S.acUsed = Math.min(S.acUsed + 1, acMaxSessions());
        await db.settings.put({ key: 'acUsed', value: S.acUsed });
        toast(`🤖 Sessão de Auto-Clicker encerrada. Restam ${acRemaining()} sessão(ões) hoje.`, 'info', 5000);
        render();
      }
    }

    async function loadMissions() {
      const today = todayStr();
      const keys = ['mDate', 'mLogin', 'mMine', 'mLav'];
      const vals = await Promise.all(keys.map(k => db.settings.get(k)));
      const [mDate, mLogin, mMine, mLav] = vals.map(v => v?.value);
      if (mDate !== today) {
        S.missions = { date: today, mLogin: 0, mMine: 0, mLav: 0 };
        await db.settings.bulkPut([
          { key: 'mDate', value: today }, { key: 'mLogin', value: 0 },
          { key: 'mMine', value: 0 }, { key: 'mLav', value: 0 },
        ]);
      } else {
        S.missions = { date: today, mLogin: mLogin || 0, mMine: mMine || 0, mLav: mLav || 0 };
      }
      if (S.missions.mLogin < 1) {
        S.missions.mLogin = 1;
        await db.settings.put({ key: 'mLogin', value: 1 });
      }
    }

    async function trackMission(key, amount = 1) {
      if (!S.missions) return;
      S.missions[key] = (S.missions[key] || 0) + amount;
      await db.settings.put({ key, value: S.missions[key] });
    }

    let cdTimerActive = false;
    function startCdTimer() {
      if (cdTimerActive) return;
      cdTimerActive = true;
      const tick = async () => {
        if (!S.user) { cdTimerActive = false; return; }

        const area = document.getElementById('cooldown-area');
        const timer = document.getElementById('cd-timer');
        const btn = document.getElementById('btn-start-mine');

        let lastMineVal = 0;
        try {
          const { data } = await sb.from('users').select('last_mine').eq('discord_id', S.user.id).single();
          if (data?.last_mine) lastMineVal = data.last_mine;
        } catch (e) { }

        if (!lastMineVal) {
          const lm = await db.settings.get('lastMine');
          lastMineVal = lm?.value || 0;
        }

        if (!lastMineVal) {
          if (area) area.classList.add('hidden');
          if (btn) { btn.disabled = false; btn.innerHTML = `⛏️ Começar ${getLabel('mining')}`; }
          setTimeout(tick, 2000); // Check again later
          return;
        }

        const elapsed = Date.now() - lastMineVal;
        const cd = cooldownMs();
        const rem = cd - elapsed;

        if (rem <= 0) {
          if (area) area.classList.add('hidden');
          if (btn) {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btn.innerHTML = `⛏️ Começar ${getLabel('mining')}`;
          }
          // Se autoClicker estiver on e não estiver minerando agora, clica
          await checkAcSession();
          if (S.autoClicker && !S.mining) {
            startMining(true);
          }
          setTimeout(tick, 1000); // Keep checking for next mine
          return;
        }

        if (area) area.classList.remove('hidden');
        if (timer) timer.textContent = `${Math.floor(rem / 60000)}m ${Math.floor((rem % 60000) / 1000)}s`;
        if (btn) {
          btn.disabled = true;
          btn.classList.add('opacity-50', 'cursor-not-allowed');
          btn.innerHTML = `⏳ Aguardando Cooldown...`;
        }

        setTimeout(tick, 1000);
      };
      tick();
    }

    // ═══════════════════════════════════════════════════════
    function iniciarPollingPix(txid, tipo) {
      if (!txid) return;
      let tentativas = 0;
      const MAX = 24; // 2 minutos (24 × 5s)
      const interval = setInterval(async () => {
        tentativas++;
        if (tentativas > MAX || !S.pixModal) { clearInterval(interval); return; }
        try {
          const { data } = await sb.functions.invoke('verificar-pix', { body: { txid, tipo } });
          if (data?.pago) {
            clearInterval(interval);
            S.pixModal = null;
            if (tipo === 'vip') {
              S.is_vip = true;
              toast('🎉 VIP ativado! Bem-vindo ao clube!', 'success', 6000);
            } else if (tipo === 'deposito') {
              toast('✅ Depósito confirmado! Saldo atualizado.', 'success', 5000);
            } else {
              toast('✅ Compra confirmada! Grão transferido.', 'success', 5000);
            }
            await go(S.page, {}, true);
          }
        } catch (e) { /* silencioso */ }
      }, 5000);
    }

        if (notifPref) S.notificationsEnabled = notifPref.value;

        await loadLavoura();
        await loadAcState();
        await updateOnlineCount();
        await go(S.page || 'inventory', {}, true);
        setupBackButton();

        if (S.user) {
          initPeer();
          startPresence();
          setupRealtime();

          if (S.autoClicker) {
            setTimeout(() => startMining(), 3000);
          }
        }

        setInterval(() => {
          if (S.page === 'mine' && S.mining) {
            const bar = document.querySelector('.progress-bar');
            const hashrate = document.querySelector('.hashrate-val');
            if (bar) bar.style.width = S.miningProgress + '%';
            if (hashrate) hashrate.textContent = S.hashrate.toLocaleString();
          }
        }, 800);
      } catch (err) {
        console.error('CRITICAL INIT ERROR:', err);
        document.body.innerHTML = `<div style="padding:20px; color:red; font-family:sans-serif;">
          <h2>Erro de Inicialização</h2>
          <p>${err.message}</p>
          <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:10px 20px; border-radius:5px;">Recarregar</button>
        </div>`;
      }
    }

    init();
  </script>
</body>

</html>
