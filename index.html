// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// CRIPTO
// ═══════════════════════════════════════════════════════
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function leadingZeros(h){ let n=0; for(const c of h){if(c==='0')n++;else break} return n }

// ═══════════════════════════════════════════════════════
// DIFICULDADE
// ═══════════════════════════════════════════════════════
function diffOffset(){ return Math.floor(S.networkSize / 50) }
// 5min base + 1min por nó adicional, máx 60min
function cooldownMs(){ return Math.min(CFG.BASE_COOLDOWN_MS + (S.networkSize - 1) * 60000, 60 * 60 * 1000) }
function minZeros(){ return 1 + diffOffset() }
function rarityForZeros(z){
  const o = diffOffset();
  if(z >= 9+o) return 'niobium';
  if(z >= 8+o) return 'bismuth';
  if(z >= 7+o) return 'opal';
  if(z >= 6+o) return 'uranium';
  if(z >= 5+o) return 'diamond';
  if(z >= 4+o) return 'gold';
  if(z >= 3+o) return 'silver';
  if(z >= 2+o) return 'copper';
  if(z >= 1+o) return 'brass';
  return null;
}

// ═══════════════════════════════════════════════════════
// IDs DOS GRÃOS
// ═══════════════════════════════════════════════════════
async function nextId(rarity){
  const pfx = RARITY[rarity].prefix;
  try{
    const { data, error } = await sb.rpc('increment_counter', { r: rarity });
    if(!error && data){
      await db.counters.put({ rarity, count: data });
      return `grão#${pfx}${String(data).padStart(2,'0')}`;
    }
  }catch(e){}
  // fallback offline
  const rec = await db.counters.get(rarity);
  const n   = (rec?.count || 0) + 1;
  await db.counters.put({ rarity, count: n });
  return `grão#${pfx}${String(n).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════
// ASSINATURA
// ═══════════════════════════════════════════════════════
async function signGrain(g){
  return sha256(`${g.id}${g.hash}${g.discord_id}${g.generated_at}`);
}
async function verifyGrain(g){
  return g.signature === await signGrain(g);
}

// ═══════════════════════════════════════════════════════
// MINERAÇÃO
// ═══════════════════════════════════════════════════════
async function startMining(){
  if(!S.user){ toast('Faça login primeiro!','error'); return }
  if(S.mining) return;

  // Checa cooldown no Supabase (sincroniza entre dispositivos)
  try{
    const { data } = await sb.from('users').select('last_mine').eq('discord_id', S.user.id).single();
    if(data?.last_mine){
      const elapsed = Date.now() - data.last_mine;
      if(elapsed < cooldownMs()){
        const mins = Math.ceil((cooldownMs()-elapsed)/60000);
        const secs = Math.ceil((cooldownMs()-elapsed)/1000) % 60;
        toast(`Cooldown: ${mins}m ${secs}s restante(s)`,'warning');
        await db.settings.put({ key:'lastMine', value: data.last_mine });
        return;
      }
    }
  }catch(e){
    // fallback local
    const lastMine = await db.settings.get('lastMine');
    if(lastMine){
      const elapsed = Date.now() - lastMine.value;
      if(elapsed < cooldownMs()){
        const mins = Math.ceil((cooldownMs()-elapsed)/60000);
        toast(`Cooldown: ${mins} minuto(s) restante(s)`,'warning');
        return;
      }
    }
  }

  S.mining = true;
  S.miningCancelled = false;
  S.miningProgress = 0;
  S.hashrate = 0;
  render();

  const base      = `${S.user.id}:${Date.now()}`;
  let nonce       = 0;
  let start       = Date.now();
  let found       = null;
  let foundHash   = '';

  const tick = async () => {
    if(S.miningCancelled){ S.mining=false; render(); return }

    for(let i=0;i<CFG.CHUNK_SIZE;i++){
      if(S.miningCancelled) break;
      const h = await sha256(`${base}:${nonce}`);
      const z = leadingZeros(h);
      const r = rarityForZeros(z);
      if(r){ found=r; foundHash=h; break }
      nonce++;
    }

    const secs = (Date.now()-start)/1000;
    S.hashrate  = Math.round(nonce/Math.max(secs,0.001));
    S.miningProgress = Math.min(94, (nonce/100000)*100);

    if(found){
      await finishMining(foundHash, found, nonce);
    } else {
      render();
      setTimeout(tick, 0);
    }
  };
  setTimeout(tick, 0);
}

async function finishMining(hash, rarity, nonce){
  const id   = await nextId(rarity);
  const user = S.user;
  const grain = {
    id, rarity, hash, nonce,
    generated_at: Date.now(),
    discord_user: user.global_name || user.username || user.id,
    discord_id: user.id,
    network_size_at_generation: S.networkSize,
    owner: user.id,
    transfer_history: []
  };
  grain.signature = await signGrain(grain);
  await db.grains.add(grain);
  const now = Date.now();
  await db.settings.put({ key:'lastMine', value: now });
  sbUpsertGrain(grain);
  sb.from('users').update({ last_mine: now }).eq('discord_id', user.id).then(()=>{});
  addGrainToLavoura(grain);

  S.mining = false;
  S.miningProgress = 100;
  spawnParticles(rarity);
  broadcastGrain(grain);
  toast(`🎉 ${id} minerado! (${RARITY[rarity].label})`,'success',5000);
  setTimeout(()=>{ S.miningProgress=0; render() }, 2500);
  render();
}

function cancelMining(){ S.miningCancelled = true }

function spawnParticles(rarity){

  const num = rarity==='diamond'?60 : rarity==='gold'?40 : 25;

    const p = document.createElement('div');
    p.className='particle';
    const ang = Math.random()*Math.PI*2;
    const dist = 80 + Math.random()*200;
    p.style.cssText=`background:${col};left:50%;top:50%;
      --dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;
      animation-delay:${Math.random()*0.4}s;
      box-shadow:0 0 4px ${col};`;
    c.appendChild(p);
    setTimeout(()=>p.remove(), 1600);
  }
}

async function handleDiscordCallback(){
  const hash = window.location.hash;
  if(!hash || !hash.includes('access_token')) return false;
  const p = new URLSearchParams(hash.slice(1));
  const tk = p.get('access_token');
  if(!tk) return false;
  try{
    const res  = await fetch('https://discord.com/api/users/@me',{ headers:{ Authorization:`Bearer ${tk}` }});
    const user = await res.json();
    if(!user.id) throw new Error('bad response');
    S.user = user;
    await db.settings.put({ key:'discordUser', value: user });
    history.replaceState(null,'', window.location.pathname);
    toast(`Bem-vindo, ${user.global_name||user.username}!`,'success');
    sbUpsertUser(user);
    updateNetworkSize();
    await syncFromSupabase(user.id); // restaura grãos do servidor primeiro
    syncLocalGrains(user.id);        // depois sobe os locais que faltam
    return true;
  }catch(e){
    toast('Erro ao autenticar com Discord','error');
    return false;
  }
}

// ═══════════════════════════════════════════════════════
// TRANSFERÊNCIA P2P
// ═══════════════════════════════════════════════════════
async function generateTransferPkg(grainId, targetId){
  const g = await db.grains.where('id').equals(grainId).first();
  if(!g){ toast('Grão não encontrado','error'); return null }
  if(g.owner !== S.user.id){ toast('Você não é o dono','error'); return null }

  const pkg = {
    type: 'graonet_transfer', version:'1.0',
    grain: { ...g },
    from: S.user.id,
    from_username: g.discord_user,
    to: targetId,
    timestamp: Date.now(),
    nonce: crypto.randomUUID()
  };
  const raw = `${g.id}:${pkg.from}:${pkg.to}:${pkg.timestamp}:${pkg.nonce}`;
  pkg.sig = await sha256(raw);
  return JSON.stringify(pkg, null, 2);
}

async function receivePkg(json){
  let pkg;
  try{ pkg = JSON.parse(json) }
  catch(e){ toast('JSON inválido','error'); return false }
  if(pkg.type !== 'graonet_transfer'){ toast('Tipo inválido','error'); return false }
  if(!S.user || pkg.to !== S.user.id){ toast('Este pacote não é para você','error'); return false }

  const raw  = `${pkg.grain.id}:${pkg.from}:${pkg.to}:${pkg.timestamp}:${pkg.nonce}`;
  const exp  = await sha256(raw);
  if(pkg.sig !== exp){ toast('Assinatura inválida!','error'); return false }

  const existing = await db.grains.where('id').equals(pkg.grain.id).first();
  const updated  = {
    ...pkg.grain,
    owner: S.user.id,
    transfer_history: [...(pkg.grain.transfer_history||[]), {
      from: pkg.from_username, to: S.user.id, timestamp: pkg.timestamp
    }]
  };
  if(existing){ await db.grains.where('id').equals(pkg.grain.id).modify(updated) }
  else         { await db.grains.add(updated) }

  await db.transfers.add({ grainId:pkg.grain.id, from_user:pkg.from, to_user:S.user.id, timestamp:pkg.timestamp });
  sbUpsertGrain(updated); // sincroniza novo dono no Supabase
  toast(`${pkg.grain.id} recebido de ${pkg.from_username}!`,'success',5000);
  render();
  return true;
}

// ═══════════════════════════════════════════════════════
// REDE P2P (PeerJS)
// ═══════════════════════════════════════════════════════
function initPeer(){
  if(!S.user || window._peer) return;
  const pid = `graonet-${S.user.id}`.replace(/[^a-zA-Z0-9\-_]/g,'_');
  try{
    const peer = new Peer(pid, CFG.PEER_CFG);
    window._peer = peer;
    peer.on('open', id =>{ S.peerId=id; syncNetwork(); updateHeader() });
    peer.on('connection', conn => setupConn(conn));
    peer.on('error', ()=>{});
  }catch(e){}
}

function setupConn(conn){
  conn.on('open',()=>{
    S.peers.set(conn.peer, conn);
    S.networkSize = Math.max(S.networkSize, S.peers.size+1);
    conn.send({ type:'hello', userId: S.user?.id });
    updateHeader();
  });
  conn.on('data', d => handlePeerData(conn, d));
  conn.on('close',()=>{ S.peers.delete(conn.peer); updateNetSize(); updateHeader() });
}

async function handlePeerData(conn, d){
  if(d.type==='hello'){
    const ctrs = await db.counters.toArray();
    conn.send({ type:'counters', data: ctrs });
    S.networkSize = Math.max(S.networkSize, S.peers.size+1);
  }
  if(d.type==='counters'){
    for(const c of d.data||[]){
      const loc = await db.counters.get(c.rarity);
      if(!loc || c.count > loc.count) await db.counters.put(c);
    }
  }
  if(d.type==='new_grain') S.networkSize = Math.max(S.networkSize, d.net||1);
}

function broadcastGrain(g){
  for(const [,c] of S.peers){
    try{ c.send({ type:'new_grain', rarity:g.rarity, net: S.networkSize }) }catch(e){}
  }
}
function updateNetSize(){ S.networkSize = Math.max(1, S.peers.size+1) }
function syncNetwork(){ updateNetSize() }
function updateHeader(){
  const el = document.getElementById('net-size');
  if(el) el.textContent = `${S.onlineCount} online · ${S.networkSize} na rede`;
}

// ═══════════════════════════════════════════════════════
// SISTEMA DE LAVOURA
// ═══════════════════════════════════════════════════════
function lavouraRewards(n){
  const num = ((n-1) % 9) + 1; // ciclo 1-9
  if(num === 1) return ['copper','silver'];
  if(num === 2) return ['silver','silver'];
  if(num === 3) return ['silver','gold'];
  if(num === 4) return ['silver','silver','gold'];
  if(num === 5) return ['gold','gold'];
  if(num === 6) return ['gold','diamond'];
  if(num === 7) return ['gold','gold','diamond'];
  if(num === 8) return ['diamond','diamond'];
  return ['diamond','uranium']; // 9
}

function lavouraCapacity(n){
  return Math.pow(10, n + 2);
}

async function loadLavoura(){
  try{
    const { data } = await sb.from('lavouras').select('*').eq('status','active').order('number').limit(1).single();
    if(data){
      S.lavoura = data;
      if(S.user){
        const { data: c } = await sb.from('lavoura_contributions')
          .select('grains_count').eq('lavoura_id', data.id).eq('discord_id', S.user.id).single();
        S.myContrib = c?.grains_count || 0;
      }
    }
  }catch(e){}
}

async function addGrainToLavoura(grain){
  if(!S.lavoura || !S.user) return;
  try{
    const { data } = await sb.rpc('add_grain_to_lavoura',{
      p_lavoura_id: S.lavoura.id,
      p_discord_id: S.user.id,
      p_discord_user: grain.discord_user
    });
    if(data && !data.error){
      S.lavoura.grains_count = data.count;
      S.myContrib = (S.myContrib || 0) + 1;
      if(data.full) await handleHarvest();
    }
  }catch(e){}
}

async function handleHarvest(){
  try{
    const { data } = await sb.rpc('harvest_lavoura',{ p_lavoura_id: S.lavoura.id });
    if(data?.error) return; // outro device já colheu
    const lavNum  = S.lavoura.number;
    const isWinner = data.top_id === S.user.id;
    if(isWinner){
      const rewards = lavouraRewards(lavNum);
      const gained  = [];
      for(const rarity of rewards){
        const id = await nextId(rarity);
        const reward = {
          id, rarity, nonce: 0,
          hash: await sha256(`reward:lavoura${lavNum}:${S.user.id}:${id}:${Date.now()}`),
          generated_at: Date.now(),
          discord_user: S.user.global_name || S.user.username,
          discord_id: S.user.id,
          network_size_at_generation: S.networkSize,
          owner: S.user.id,
          transfer_history: [],
          reward_from_lavoura: lavNum
        };
        reward.signature = await signGrain(reward);
        await db.grains.add(reward);
        sbUpsertGrain(reward);
        gained.push(`${RARITY[rarity].emoji} ${id}`);
      }
      spawnParticles(rewards[rewards.length-1]);
      toast(`🌾 Lavoura #${lavNum} colhida! Você foi o top! +${gained.join(' · ')}`,'success',8000);
    } else {
      toast(`🌾 Lavoura #${lavNum} colhida! Top contribuidor: ${data.top_name}`,'info',5000);
    }
    await loadLavoura();
  }catch(e){}
}

async function createListing(){
  const offerRarity   = document.getElementById('mkt-offer-rarity')?.value;
  const offerQty      = parseInt(document.getElementById('mkt-offer-qty')?.value) || 1;
  const offerMinNonce = parseInt(document.getElementById('mkt-offer-min-nonce')?.value) || 0;

  const askingRarity   = document.getElementById('mkt-asking-rarity')?.value;
  const askingQty      = parseInt(document.getElementById('mkt-asking-qty')?.value) || 1;
  const askingMinNonce = parseInt(document.getElementById('mkt-asking-min-nonce')?.value) || 0;

  if(offerRarity === askingRarity){ toast('Não pode trocar pelo mesmo minério','error'); return }

  const processGrains = await db.grains.where('owner').equals(S.user.id).toArray();
  const availableToOffer = processGrains.filter(g => g.rarity === offerRarity && (g.nonce||0) >= offerMinNonce);

  if(availableToOffer.length < offerQty){
    toast(`Você não tem ${offerQty}x ${RARITY[offerRarity].label} com raridade mínima de ${offerMinNonce}`,'error');
    return;
  }

  const offeredIds = availableToOffer.slice(0, offerQty).map(g => g.id);

  const { error } = await sb.from('market_listings_v2').insert({
    seller_id:    S.user.id,
    seller_name:  S.user.global_name || S.user.username,
    offered_grain_ids: offeredIds,
    offering_rarity: offerRarity,
    offering_qty: offerQty,
    offering_min_nonce: offerMinNonce,
    asking_rarity: askingRarity,
    asking_qty: askingQty,
    asking_min_nonce: askingMinNonce
  });
  if(error){ toast('Erro ao criar oferta','error'); return }
  toast('Oferta publicada!','success');
  render();
}

  await sb.from('market_listings_v2').update({ status:'cancelled' }).eq('id',id).eq('seller_id',S.user.id);

async function confirmTrade(listingId){
  const listing = S.acceptingListing;
  const myGrains = await db.grains.where('owner').equals(S.user.id).toArray();
  const payable = myGrains.filter(g => g.rarity === listing.asking_rarity && (g.nonce||0) >= listing.asking_min_nonce);
  
  if(payable.length < listing.asking_qty){
    toast('Você não tem os requisitos para essa troca.','error');
    return;
  }
  
  const paymentIds = payable.slice(0, listing.asking_qty).map(g => g.id);

  const { data, error } = await sb.rpc('execute_trade_v2',{
    p_listing_id: listingId,
    p_buyer_id: S.user.id,
    p_payment_grain_ids: paymentIds
  });
  if(error || (data && data.error)){ toast(`Erro: ${data?.error||error?.message}`,'error'); return }

  const received_ids = data.received_grain_ids || [];
  const { data: recGrains } = await sb.from('grains').select('*').in('id', received_ids);
  if(recGrains){
    for(const g of recGrains){
      const exists = await db.grains.where('id').equals(g.id).first();
      if(exists) await db.grains.where('id').equals(g.id).modify({...g, owner: S.user.id});
      else await db.grains.add({...g, owner: S.user.id});
    }
  }
  
  for(const pid of paymentIds){
    await db.grains.where('id').equals(pid).modify({ owner: data.seller_id });
  }

  S.acceptingListing = null;
  spawnParticles(listing.offering_rarity);
  toast(`✅ Troca concluída! Você recebeu ${listing.offering_qty}x ${RARITY[listing.offering_rarity].emoji}`,'success',5000);
  render();
}

async function syncFromSupabase(userId){
  try{
    const { data, error } = await sb.from('grains').select('*').eq('owner', userId);
    if(error || !data?.length) return;
    let restored = 0;
    for(const g of data){
      const exists = await db.grains.where('id').equals(g.id).first();
      if(!exists){
        // remove campo localId se vier do supabase
        const { localId, ...grain } = g;
        await db.grains.add(grain);
        restored++;
      }
    }
    if(restored > 0){
      toast(`✅ ${restored} Grão${restored!==1?'s':''} restaurado${restored!==1?'s':''} do servidor!`,'success',5000);
    }
  }catch(e){}
}

async function exportBackup(){

  const counters = await db.counters.toArray();
  const data = JSON.stringify({ type:'graonet_backup', version:'1.0', user:S.user, exported_at:Date.now(), grains, counters }, null, 2);
  const a = Object.assign(document.createElement('a'),{
    href: URL.createObjectURL(new Blob([data],{type:'application/json'})),
    download: `graonet-backup-${Date.now()}.json`
  });
  a.click();
  toast('Backup exportado!','success');

async function importBackup(file){
  if(!file) return;
  let bk;
  try{ bk = JSON.parse(await file.text()) }
  catch(e){ toast('Arquivo inválido','error'); return }
  if(bk.type !== 'graonet_backup'){ toast('Formato inválido','error'); return }
  let added=0;
  for(const g of bk.grains||[]){
    const ex = await db.grains.where('id').equals(g.id).first();
    if(!ex){ await db.grains.add(g); added++ }
  }
  for(const c of bk.counters||[]){
    const loc = await db.counters.get(c.rarity);
    if(!loc || c.count > loc.count) await db.counters.put(c);
  }
  toast(`Importado! ${added} grão(s) novo(s) adicionado(s)`,'success',5000);
  render();
}

function toast(msg, type='info', dur=3000){
  const c = document.getElementById('toasts'); if(!c) return;
  const cls = { success:'bg-green-900 border-green-600 text-green-100', error:'bg-red-900 border-red-600 text-red-100',
    warning:'bg-yellow-900 border-yellow-600 text-yellow-100', info:'bg-blue-900 border-blue-600 text-blue-100' };
  const el = document.createElement('div');
  el.className=`px-4 py-2 rounded border text-sm pointer-events-auto shadow-lg ${cls[type]||cls.info}`;
  el.style.animation='fadeIn 0.2s ease forwards';
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300) }, dur);
}

async function pageRanking(){
  let all = [];
  let source = 'local';
  try{
    const { data, error } = await sb.from('grains').select('id,rarity,owner,discord_user,discord_id');
    if(!error && data?.length){ all = data; source = 'global'; }
  }catch(e){}
  if(!all.length) all = await db.grains.toArray();

  const map = {};
  const emptyC = () => Object.fromEntries(ORDER.map(r=>[r,0]));
  for(const g of all){
    const uid = g.owner || g.discord_id || 'unknown';
    if(!map[uid]) map[uid] = { name: g.discord_user||uid, counts: emptyC() };
    if(g.rarity && map[uid].counts[g.rarity] !== undefined) map[uid].counts[g.rarity]++;
  }
  const SCORES = { niobium:100000, bismuth:10000, opal:1000, uranium:500, diamond:100, gold:20, silver:5, copper:2, brass:1 };
  const score = u => ORDER.reduce((s,r)=> s + (u.counts[r]||0)*SCORES[r], 0);
  const users = Object.entries(map).sort((a,b)=>score(b[1])-score(a[1]));

  return `<div class="p-4 sm:p-6 max-w-5xl mx-auto">
    <h2 class="text-2xl font-bold mb-1">🏆 Ranking</h2>
    <p class="text-gray-400 text-sm mb-2">Top holders de toda a rede GrãoNet.</p>
    <div class="text-[10px] text-gray-600 mb-4">${source==='global'?`✅ Dados globais · ${all.length} grão(s) · ${users.length} jogador(es)`:'⚠️ Dados locais (offline)'}</div>
    <div class="bg-gray-900 rounded-lg overflow-x-auto scrollbar-thin">
      <table class="w-full text-xs min-w-[700px]">
        <thead>
          <tr class="border-b border-gray-800 text-[10px] text-gray-500">
            <th class="text-left px-4 py-2 w-40">Usuário</th>
            ${ORDER.map(r=>`<th class="text-center py-2 px-1" style="color:${RARITY[r].color}">${RARITY[r].emoji}<br><span class="text-[9px]">${RARITY[r].label}</span></th>`).join('')}
            <th class="text-right px-4 py-2">Pts</th>
          </tr>
        </thead>
        <tbody>
          ${users.length===0?`<tr><td colspan="${ORDER.length+2}" class="text-center py-8 text-gray-600">Nenhum grão minerado ainda</td></tr>`
            :users.slice(0,50).map(([uid,d],i)=>{
              const sc  = score(d);
              const me  = uid===S.user?.id;
              const med = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
              return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/40 transition-colors ${me?'bg-gray-800/30':''}">
                <td class="px-4 py-2">
                  <span class="mr-1">${med}</span>
                  <span class="${me?'text-cyan-400 font-bold':'text-gray-300'}">${d.name}</span>
                </td>
                ${ORDER.map(r=>`<td class="text-center py-2 px-1 font-mono" style="color:${RARITY[r].color}">
                  ${d.counts[r]?d.counts[r]:'<span class="text-gray-700">–</span>'}
                </td>`).join('')}
                <td class="text-right px-4 py-2 text-yellow-400 font-bold">${sc.toLocaleString()}</td>
              </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>
    <div class="mt-3 text-[10px] text-gray-600 text-center flex flex-wrap justify-center gap-2">
      ${ORDER.map(r=>`<span style="color:${RARITY[r].color}">${RARITY[r].emoji}×${SCORES[r].toLocaleString()}</span>`).join('<span class="text-gray-700">+</span>')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// HANDLERS DOM
// ═══════════════════════════════════════════════════════
function setFilter(r){ S.filter=r; render() }

async function doGenerateTransfer(){
  const target = document.getElementById('tr-target')?.value?.trim();
  const grain  = document.getElementById('tr-grain')?.value;
  if(!target){ toast('Informe o Discord ID do destinatário','error'); return }
  if(!grain) { toast('Selecione um grão','error'); return }
  if(target === S.user.id){ toast('Não pode transferir para si mesmo','error'); return }
  const pkg = await generateTransferPkg(grain, target);
  if(pkg){
    await db.grains.where('id').equals(grain).modify({ owner: '__transferred__' });
    const out = document.getElementById('tr-out');
    const ta  = document.getElementById('tr-pkg');
    if(out && ta){ out.classList.remove('hidden'); ta.value=pkg }
    toast('Pacote gerado! Copie e envie ao destinatário.','success',5000);
    // Refresh select
    const sel = document.getElementById('tr-grain');
    if(sel){ const op=sel.querySelector(`[value="${grain}"]`); if(op) op.remove() }
  }
}

async function doReceive(){
  const t = document.getElementById('tr-rcv')?.value?.trim();
  if(!t){ toast('Cole o pacote de transferência','error'); return }
  const ok = await receivePkg(t);
  if(ok){ const el=document.getElementById('tr-rcv'); if(el) el.value='' }
}

function copyPkg(){
  const ta = document.getElementById('tr-pkg');
  if(!ta) return;
  navigator.clipboard.writeText(ta.value)
    .then(()=>toast('Copiado!','success',1500))
    .catch(()=>{ ta.select(); document.execCommand('copy'); toast('Copiado!','success',1500) });
}

// ═══════════════════════════════════════════════════════
// TIMER DE COOLDOWN
// ═══════════════════════════════════════════════════════
function startCdTimer(){
  const tick = async () => {
    const el = document.getElementById('cd-timer');
    if(!el) return;
    // tenta pegar do Supabase primeiro
    let lastMineVal = 0;
    try{
      const { data } = await sb.from('users').select('last_mine').eq('discord_id', S.user.id).single();
      if(data?.last_mine) lastMineVal = data.last_mine;
    }catch(e){}
    if(!lastMineVal){
      const lm = await db.settings.get('lastMine');
      lastMineVal = lm?.value || 0;
    }
    if(!lastMineVal) return;
    const rem = cooldownMs() - (Date.now()-lastMineVal);
    if(rem <= 0){ render(); return }
    const el2 = document.getElementById('cd-timer');
    if(el2) el2.textContent = `${Math.floor(rem/60000)}m ${Math.floor((rem%60000)/1000)}s`;
    setTimeout(tick, 1000);
  };
  setTimeout(tick, 500);
}

// ═══════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════
async function render(){
  const app = document.getElementById('app');
  if(!app) return;
  let body = '';
  try{
    switch(S.page){
      case 'inventory': body = await pageInventory(); break;
      case 'mine':      body = await pageMine(); break;
      case 'market':    body = await pageMarket(); break;
      case 'transfer':  body = await pageTransfer(); break;
      case 'ranking':   body = await pageRanking(); break;
      case 'grain':     body = await pageGrain(S.params.id); break;
      default:          body = await pageInventory();
    }
  }catch(e){ body=`<div class="p-6 text-red-400">Erro: ${e.message}</div>` }
  app.innerHTML = renderHeader() + `<main class="fade-in">${body}</main>`;
  if(S.page==='mine' && !S.mining) startCdTimer();
}

// ═══════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════
async function init(){
  const fromDiscord = await handleDiscordCallback();
  if(!fromDiscord){
    const saved = await db.settings.get('discordUser');
    if(saved?.value){
      S.user = saved.value;
      sbUpsertUser(S.user);
      updateNetworkSize();
      await syncFromSupabase(S.user.id);
      syncLocalGrains(S.user.id);
    }
  }
  await loadLavoura();
  await render();
  setupBackButton();
  if(S.user){ initPeer(); startPresence(); }

  // Re-render mining progress every 800ms
  setInterval(()=>{ if(S.page==='mine' && S.mining) render() }, 800);
}

init();
</script>
